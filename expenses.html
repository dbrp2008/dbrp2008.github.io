<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Expense Tracker – FiApp</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .toolbar{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem;}
    .btn-sm{padding:.35rem .7rem;font-size:.85rem;}
    .btn-ghost{background:#e5e7eb;color:#374151;border:none;border-radius:6px;cursor:pointer;padding:.35rem .7rem;font-size:.85rem;}
    .btn-ghost:hover{background:#d1d5db;}
    .month-nav{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
    .month-nav button{background:#e5e7eb;border:none;border-radius:6px;cursor:pointer;padding:.3rem .8rem;font-size:.9rem;}
    .month-nav button:hover{background:#d1d5db;}
    .month-nav button:disabled{opacity:.35;cursor:not-allowed;}
    .month-label{font-size:1.1rem;font-weight:700;color:#374151;min-width:140px;text-align:center;}

    /* Income panel */
    .income-panel{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:.9rem 1.1rem;margin-bottom:.75rem;}
    .income-panel h3{margin:0 0 .6rem;font-size:.9rem;color:#15803d;}
    .income-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:.5rem .75rem;}
    .income-field label{font-size:.75rem;font-weight:600;color:#374151;display:block;margin-bottom:2px;}
    .income-field input[type="number"]{width:100%;padding:5px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:.88rem;box-sizing:border-box;}
    .income-computed{display:block;padding:5px 7px;border:1px solid #e5e7eb;border-radius:5px;font-size:.88rem;background:#fff;font-weight:700;}
    .tax-banner{grid-column:1/-1;font-size:.78rem;padding:.35rem .6rem;background:#dcfce7;border:1px solid #86efac;border-radius:5px;color:#15803d;}
    .pos{color:#15803d;} .neg{color:#dc2626;}
    .apply-row{grid-column:1/-1;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.2rem;}

    /* Chart */
    .chart-section{display:none;margin-bottom:1rem;padding:.75rem 1rem;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;}
    .chart-mode-btns{display:flex;gap:.4rem;margin-bottom:.5rem;}
    .chart-mode-btn{padding:.28rem .65rem;font-size:.8rem;border:1px solid #d1d5db;border-radius:5px;cursor:pointer;background:#f3f4f6;color:#374151;}
    .chart-mode-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}
    .chart-wrap{max-width:600px;margin:0 auto;}
    .top3{margin-top:.75rem;}
    .top3 h4{margin:0 0 .4rem;font-size:.88rem;color:#374151;}
    .top3 ol{margin:0;padding-left:1.2rem;font-size:.85rem;}
    .top3 li{margin-bottom:.2rem;}

    /* Spreadsheet */
    .sheet-wrap{overflow-x:auto;margin-top:.5rem;}
    table.sheet{border-collapse:collapse;table-layout:fixed;min-width:max-content;}
    table.sheet th,table.sheet td{border:1px solid #d1d5db;position:relative;overflow:hidden;padding:0;}
    table.sheet th{background:#f3f4f6;user-select:none;}
    .th-inner{display:flex;align-items:center;justify-content:center;padding:5px 6px;gap:4px;min-height:32px;}
    .th-label{flex:1;outline:none;text-align:center;font-weight:600;min-width:30px;font-size:.85rem;}
    .col-del{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.9rem;padding:0 2px;line-height:1;}
    .col-del:hover{color:#ef4444;}
    .col-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2;}
    .col-resize:hover,.col-resize.dragging{background:#93c5fd;}
    .row-resize{position:absolute;left:0;right:0;bottom:0;height:5px;cursor:row-resize;z-index:2;}
    .row-resize:hover,.row-resize.dragging{background:#93c5fd;}

    /* Row header */
    .rh-cell{position:relative;}
    .rh-inner{display:flex;align-items:center;gap:5px;padding:3px 6px;min-height:32px;}
    .color-swatch{width:13px;height:13px;flex-shrink:0;border-radius:3px;border:1px solid rgba(0,0,0,.2);cursor:pointer;}
    .color-hidden{display:none;}
    .row-label{flex:1;outline:none;font-weight:600;font-size:.85rem;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .collapse-btn{background:none;border:none;cursor:pointer;font-size:.8rem;color:#6b7280;padding:0 2px;flex-shrink:0;line-height:1;}
    .collapse-btn:hover{color:#374151;}

    /* Subcategory menu (portal, fixed-position) */
    .sub-dropdown{position:relative;flex-shrink:0;}
    .sub-add-btn{background:none;border:1px solid #d1d5db;border-radius:4px;cursor:pointer;font-size:.72rem;padding:1px 5px;color:#6b7280;white-space:nowrap;}
    .sub-add-btn:hover{background:#f3f4f6;color:#374151;}
    .sub-menu{position:fixed;z-index:9999;background:#fff;border:1px solid #d1d5db;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.15);max-height:260px;overflow-y:auto;min-width:200px;}
    .sub-menu-group{padding:.25rem .5rem .1rem;font-size:.7rem;font-weight:700;color:#9ca3af;text-transform:uppercase;}
    .sub-menu-item{display:block;width:100%;text-align:left;padding:.3rem .75rem;font-size:.82rem;border:none;background:none;cursor:pointer;color:#374151;}
    .sub-menu-item:hover{background:#f3f4f6;}
    .sub-other{border-top:1px solid #e5e7eb;color:#7c3aed;font-weight:600;}
    .sub-other-form{padding:.4rem .55rem;display:flex;flex-direction:column;gap:.35rem;}
    .sub-other-form input{padding:5px 7px;border:1px solid #d1d5db;border-radius:4px;font-size:.83rem;outline:none;}
    .sub-other-form input:focus{border-color:#7c3aed;}
    .sub-other-form .row{display:flex;gap:.3rem;}
    .sub-other-form button{flex:1;padding:.3rem .5rem;border:none;border-radius:4px;font-size:.78rem;cursor:pointer;}
    .sub-other-form .ok{background:#7c3aed;color:#fff;}
    .sub-other-form .cancel{background:#e5e7eb;color:#374151;}
    .sub-other-err{color:#dc2626;font-size:.74rem;}

    /* Child rows */
    .child-row .rh-inner{padding-left:22px;}
    .child-row .row-label{font-weight:500;font-size:.83rem;color:#374151;}

    /* Number inputs */
    .num-input{display:block;width:100%;height:100%;min-height:32px;border:none;outline:none;padding:4px 7px;box-sizing:border-box;background:transparent;font-family:inherit;font-size:.85rem;text-align:right;}
    .num-input:focus{background:#eff6ff;}
    .num-input::-webkit-inner-spin-button,.num-input::-webkit-outer-spin-button{opacity:0;}
    .num-input:hover::-webkit-inner-spin-button{opacity:1;}
    .parent-sum{display:block;padding:4px 7px;text-align:right;color:#6b7280;font-size:.83rem;min-height:32px;line-height:24px;font-style:italic;}

    /* Total column */
    .th-total{background:#dcfce7;color:#166534;}
    .total-val{display:block;padding:4px 7px;font-weight:700;text-align:right;color:#166534;font-size:.85rem;min-height:32px;line-height:24px;background:#f0fdf4;}

    /* Footer */
    table.sheet tfoot td{background:#f8fafc;font-weight:700;border-top:2px solid #9ca3af;}
    .gtotal-val{display:block;padding:4px 7px;font-weight:800;text-align:right;font-size:.85rem;min-height:32px;line-height:24px;}
    .week-total-cell{background:#ecfdf5;}
    .week-total-cell .gtotal-val{color:#15803d;}
    .gtotal-cell{background:#dcfce7;color:#15803d;}
    .gtotal-cell .gtotal-val{font-size:.95rem;}

    .row-del{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:.9rem;padding:0 3px;}
    .row-del:hover{color:#ef4444;}
    .del-td{width:32px;text-align:center;background:#f9fafb;}
    .btn-add-col{background:none;border:1px dashed #9ca3af;border-radius:4px;cursor:pointer;font-size:1rem;padding:3px 8px;color:#6b7280;white-space:nowrap;}
    .btn-add-col:hover{background:#f3f4f6;}
    .btn-add-row{background:none;border:1px dashed #9ca3af;border-radius:4px;cursor:pointer;font-size:.82rem;padding:4px 12px;color:#6b7280;margin-top:4px;}
    .btn-add-row:hover{background:#f3f4f6;}
  </style>
</head>
<body>
  <div class="nav"><a href="{{ url_for('home') }}">← Home</a></div>
  <h1>Expense Tracker</h1>
  <p style="color:#6b7280;font-size:.88rem;margin-top:0">Monthly expenses by category. Click "+Sub" on a row to add a subcategory. Ctrl+Z/Y to undo/redo (persists across page visits).</p>

  <div class="month-nav">
    <button id="prev-btn" onclick="shiftMonth(-1)">◀ Prev</button>
    <span class="month-label" id="month-label"></span>
    <button id="next-btn" onclick="shiftMonth(1)">Next ▶</button>
  </div>

  <!-- Income panel -->
  <div class="income-panel">
    <h3>Monthly Budget — <span id="budget-month"></span></h3>
    <div class="income-grid" id="income-grid">
      <div class="income-field">
        <label>Gross Monthly Income ($)</label>
        <input type="number" id="inp-gross" min="0" step="0.01" placeholder="0.00" oninput="onIncomeInput()">
      </div>
      <div class="income-field">
        <label>Monthly Tax / Deductions ($) <a href="{{ url_for('tax') }}" id="tax-link" style="font-weight:400;font-size:.75rem">— calculate →</a></label>
        <input type="number" id="inp-tax" min="0" step="0.01" placeholder="0.00" oninput="onIncomeInput()">
      </div>
      <div class="income-field">
        <label>Annual Gross (auto)</label>
        <span class="income-computed" id="disp-annual">—</span>
      </div>
      <div class="income-field">
        <label>After-tax (monthly)</label>
        <span class="income-computed" id="disp-aftertax">—</span>
      </div>
      <div class="income-field">
        <label>Total Expenses This Month</label>
        <span class="income-computed" id="disp-expenses">—</span>
      </div>
      <div class="income-field">
        <label>Remaining</label>
        <span class="income-computed" id="disp-remaining">—</span>
      </div>
      <div class="apply-row">
        <button class="btn-ghost btn-sm" id="apply-year-btn" onclick="applyIncomeToYear()" style="display:none;font-size:.78rem;" title="Copy this month's income/tax to all months in the same year">Apply to all months in <span id="apply-year-lbl"></span></button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-sm" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
    <button class="btn btn-sm" id="redo-btn" onclick="redo()" disabled>↪ Redo</button>
    <button class="btn btn-sm" onclick="addRow()">+ Row</button>
    <button class="btn btn-sm" onclick="addCol()">+ Column</button>
    <button class="btn btn-sm btn-ghost" onclick="expandAll()">▾ Expand All</button>
    <button class="btn btn-sm btn-ghost" onclick="collapseAll()">▸ Collapse All</button>
    <button class="btn btn-sm" id="chart-btn" onclick="toggleChart()">📊 Chart</button>
    <button class="btn btn-sm" id="reset-btn" onclick="resetAll()" style="background:#dc2626">Reset</button>
  </div>

  <div class="chart-section" id="chart-section">
    <div class="chart-mode-btns">
      <button class="chart-mode-btn active" id="chart-mode-m" onclick="setChartMode('monthly')">Monthly</button>
      <button class="chart-mode-btn" id="chart-mode-y" onclick="setChartMode('yearly')">Yearly</button>
    </div>
    <div class="chart-wrap"><canvas id="exp-chart"></canvas></div>
    <div class="top3" id="top3"></div>
  </div>

  <div class="sheet-wrap"><table class="sheet" id="sheet"></table></div>

<script>
const STORAGE_KEY = 'fiapp_expenses_v4';
const UNDO_KEY    = 'fiapp_expenses_undo_v4';
const REDO_KEY    = 'fiapp_expenses_redo_v4';
const TAX_KEY     = 'fiapp_tax_result';
const PREFILL_KEY = 'fiapp_prefill_income';
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT= ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const CATEGORIES = {
  'Groceries':    ['Fresh Produce','Dairy & Eggs','Meat & Seafood','Bakery','Frozen Foods','Snacks & Candy','Beverages','Household Supplies','Pet Supplies'],
  'Entertainment':['Streaming Services','Movies & Cinema','Concerts & Events','Sports Events','Video Games','Books & Magazines','Hobbies','Nightlife'],
  'Travel':       ['Flights','Hotels & Lodging','Car Rental','Public Transport','Fuel','Activities & Tours','Travel Insurance'],
  'Savings':      ['Emergency Fund','Retirement','Investments','Short-term Goals','Education Fund','Home Down Payment'],
  'Housing':      ['Rent / Mortgage','Property Tax','Home Insurance','Maintenance','HOA Fees','Furniture & Décor'],
  'Transport':    ['Car Payment','Car Insurance','Fuel','Parking','Public Transit','Ride-share'],
  'Healthcare':   ['Doctor Visits','Dental','Vision','Medication','Gym & Fitness','Mental Health','Health Insurance'],
  'Dining Out':   ['Restaurants','Fast Food','Coffee Shops','Food Delivery'],
  'Utilities':    ['Electricity','Water','Natural Gas','Internet','Phone','Cable TV'],
  'Shopping':     ['Clothing','Electronics','Home & Garden','Personal Care','Gifts'],
  'Education':    ['Tuition','Books & Supplies','Online Courses','Student Loans'],
};
const CAT_KEYS = Object.keys(CATEGORIES);
const CAT_COLORS = {
  'Groceries':'#bbf7d0','Entertainment':'#bfdbfe','Travel':'#fed7aa','Savings':'#e9d5ff',
  'Housing':'#fde68a','Transport':'#fecaca','Healthcare':'#d1fae5','Dining Out':'#fde8c8',
  'Utilities':'#e5e7eb','Shopping':'#fce7f3','Education':'#ede9fe',
};
function uid(){ return '_'+Math.random().toString(36).slice(2,9); }

// ── State ──────────────────────────────────────────────────────────────────────
function freshState(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  return {
    rows:[
      {id:uid(),label:'Groceries',    color:'#bbf7d0',height:36,parentId:null},
      {id:uid(),label:'Entertainment',color:'#bfdbfe',height:36,parentId:null},
      {id:uid(),label:'Travel',       color:'#fed7aa',height:36,parentId:null},
      {id:uid(),label:'Savings',      color:'#e9d5ff',height:36,parentId:null},
    ],
    cols:[
      {id:uid(),label:'Week 1',width:100},
      {id:uid(),label:'Week 2',width:100},
      {id:uid(),label:'Week 3',width:100},
      {id:uid(),label:'Week 4',width:100},
    ],
    headerColWidth:185, totalColWidth:110,
    cells:{}, income:{}, collapsed:{},
    currentYear:y, currentMonth:m,
    lastTaxTs:0,
  };
}
function loadState(){
  try{
    const r=localStorage.getItem(STORAGE_KEY);
    if(r){
      const s=JSON.parse(r);
      if(!s.income)    s.income={};
      if(!s.collapsed) s.collapsed={};
      if(!s.lastTaxTs) s.lastTaxTs=0;
      // strip any legacy currency cruft from prior version
      delete s.cellCurrencies; delete s.displayCurrency;
      return s;
    }
  }catch{}
  return freshState();
}
let state=loadState();
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }

// ── Undo / Redo (sessionStorage persistence) ───────────────────────────────────
let undoStack=[], redoStack=[];
function loadHistory(){
  try{
    const u=sessionStorage.getItem(UNDO_KEY); if(u) undoStack=JSON.parse(u)||[];
    const r=sessionStorage.getItem(REDO_KEY); if(r) redoStack=JSON.parse(r)||[];
  }catch{}
}
function saveHistory(){
  try{
    sessionStorage.setItem(UNDO_KEY,JSON.stringify(undoStack.slice(-60)));
    sessionStorage.setItem(REDO_KEY,JSON.stringify(redoStack.slice(-60)));
  }catch{}
}
function snapshot(){ undoStack.push(JSON.stringify(state)); redoStack.length=0; if(undoStack.length>60) undoStack.shift(); saveHistory(); updateHistBtns(); }
function undo(){ if(!undoStack.length) return; redoStack.push(JSON.stringify(state)); state=JSON.parse(undoStack.pop()); save(); saveHistory(); render(); syncIncomeInputs(); updateHistBtns(); }
function redo(){ if(!redoStack.length) return; undoStack.push(JSON.stringify(state)); state=JSON.parse(redoStack.pop()); save(); saveHistory(); render(); syncIncomeInputs(); updateHistBtns(); }
function updateHistBtns(){ document.getElementById('undo-btn').disabled=!undoStack.length; document.getElementById('redo-btn').disabled=!redoStack.length; }
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();}
});

// ── Month navigation ───────────────────────────────────────────────────────────
const today=new Date();
function mk(y,m){ return String(y)+'-'+String(m+1).padStart(2,'0'); }
function currentMK(){ return mk(state.currentYear,state.currentMonth); }
const minY=today.getFullYear()-1, minM=today.getMonth();
const maxY=today.getFullYear()+1, maxM=today.getMonth();
function isAtMin(){ return state.currentYear<minY||(state.currentYear===minY&&state.currentMonth<=minM); }
function isAtMax(){ return state.currentYear>maxY||(state.currentYear===maxY&&state.currentMonth>=maxM); }
function shiftMonth(d){
  let y=state.currentYear, m=state.currentMonth+d;
  if(m<0){y--;m=11;} if(m>11){y++;m=0;}
  state.currentYear=y; state.currentMonth=m;
  save(); updateMonthNav(); render(); syncIncomeInputs();
}
function updateMonthNav(){
  const label=MONTHS_FULL[state.currentMonth]+' '+state.currentYear;
  document.getElementById('month-label').textContent=label;
  document.getElementById('budget-month').textContent=label;
  document.getElementById('apply-year-lbl').textContent=state.currentYear;
  document.getElementById('prev-btn').disabled=isAtMin();
  document.getElementById('next-btn').disabled=isAtMax();
}

// ── Cell helpers ───────────────────────────────────────────────────────────────
function ck(rId,cId){ return currentMK()+'|'+rId+'|'+cId; }
function getRawCell(rId,cId){ return state.cells[ck(rId,cId)]||''; }
function getCell(rId,cId){ return parseFloat(state.cells[ck(rId,cId)])||0; }
function setCell(rId,cId,v){ state.cells[ck(rId,cId)]=v; save(); }

// ── Row hierarchy ──────────────────────────────────────────────────────────────
function children(rId){ return state.rows.filter(r=>r.parentId===rId); }
function hasChildren(rId){ return state.rows.some(r=>r.parentId===rId); }
function isCollapsed(rId){ return state.collapsed[rId]===true; }

// ── Calculations (USD only) ────────────────────────────────────────────────────
function rowTotal(rId){
  const kids=children(rId);
  if(kids.length) return kids.reduce((s,c)=>s+rowTotal(c.id),0);
  return state.cols.reduce((s,col)=>s+getCell(rId,col.id),0);
}
function grandTotal(){ return state.rows.filter(r=>!r.parentId).reduce((s,r)=>s+rowTotal(r.id),0); }
function colTotal(cId){
  return state.rows.filter(r=>!r.parentId).reduce((s,r)=>{
    if(hasChildren(r.id)) return s+children(r.id).reduce((cs,c)=>cs+getCell(c.id,cId),0);
    return s+getCell(r.id,cId);
  },0);
}
function fmt(n){ return '$'+Math.max(0,n).toFixed(2); }

function updateRowTotal(rId){
  const el=document.getElementById('rt-'+rId); if(el) el.textContent=fmt(rowTotal(rId));
  const row=state.rows.find(r=>r.id===rId);
  if(row&&row.parentId){ updateRowTotal(row.parentId); updateParentSumCells(row.parentId); }
}
function updateParentSumCells(pId){
  state.cols.forEach(col=>{
    const el=document.getElementById('ps-'+pId+'-'+col.id);
    if(el){
      const s=children(pId).reduce((t,c)=>t+getCell(c.id,col.id),0);
      el.textContent=s>0?fmt(s):'';
    }
  });
}
function updateColFooter(cId){
  const el=document.getElementById('ct-'+cId); if(el) el.textContent=fmt(colTotal(cId));
}
function updateGrandTotal(){
  const el=document.getElementById('gt'); if(el) el.textContent=fmt(grandTotal());
  state.cols.forEach(col=>updateColFooter(col.id));
  updateIncomeSummary();
}
function updateAll(rId){ updateRowTotal(rId); updateGrandTotal(); if(chartVisible) renderChart(); }

// ── Income panel ───────────────────────────────────────────────────────────────
function monthIncomeObj(){
  const key=currentMK();
  if(!state.income[key]){
    for(let m=0;m<12;m++){
      const k=mk(state.currentYear,m);
      if(k!==key&&state.income[k]&&(state.income[k].gross||state.income[k].tax)){
        return state.income[key]={gross:state.income[k].gross||'',tax:state.income[k].tax||''};
      }
    }
    state.income[key]={gross:'',tax:''};
  }
  return state.income[key];
}
function onIncomeInput(){
  const gross=document.getElementById('inp-gross').value;
  const tax  =document.getElementById('inp-tax').value;
  const obj=monthIncomeObj(); obj.gross=gross; obj.tax=tax;
  const gNum=parseFloat(gross)||0;
  if(gNum>0) localStorage.setItem(PREFILL_KEY,(gNum*12).toFixed(0));
  document.getElementById('apply-year-btn').style.display=(gross||tax)?'inline-block':'none';
  save(); updateIncomeSummary();
}
function syncIncomeInputs(){
  const obj=monthIncomeObj();
  document.getElementById('inp-gross').value=obj.gross||'';
  document.getElementById('inp-tax').value  =obj.tax  ||'';
  const hasData=!!(obj.gross||obj.tax);
  document.getElementById('apply-year-btn').style.display=hasData?'inline-block':'none';
  document.getElementById('apply-year-lbl').textContent=state.currentYear;
  updateIncomeSummary();
}
function applyIncomeToYear(){
  snapshot();
  const obj=monthIncomeObj();
  for(let m=0;m<12;m++){
    const k=mk(state.currentYear,m);
    state.income[k]={gross:obj.gross,tax:obj.tax};
  }
  save();
  alert('Income applied to all months in '+state.currentYear+'.');
}
function updateIncomeSummary(){
  const gross=parseFloat(document.getElementById('inp-gross').value)||0;
  const tax  =parseFloat(document.getElementById('inp-tax').value)  ||0;
  const annual=gross*12;
  const afterTax=Math.max(0,gross-tax);
  const exp=grandTotal();
  const rem=afterTax-exp;
  document.getElementById('disp-annual').textContent  =annual>0?'$'+annual.toFixed(2):'—';
  document.getElementById('disp-aftertax').textContent=gross>0?fmt(afterTax):'—';
  document.getElementById('disp-expenses').textContent=fmt(exp);
  const remEl=document.getElementById('disp-remaining');
  remEl.textContent=gross>0?('$'+Math.abs(rem).toFixed(2)+(rem<0?' over budget':'')):'—';
  remEl.className='income-computed '+(rem<0?'neg':'pos');
}

// Tax carryover: applies a freshly-calculated tax result exactly once per recalculation.
function loadTaxCarryover(){
  try{
    const t=JSON.parse(localStorage.getItem(TAX_KEY)); if(!t) return;
    // Only apply if this is a "fresh" result (not yet consumed by us)
    const isFresh = t.consumed===false || (t.ts && t.ts>(state.lastTaxTs||0));
    if(!isFresh) return;

    const obj=monthIncomeObj();
    // Always overwrite tax with the fresh value (this is the bug fix)
    obj.tax = (t.tax/12).toFixed(2);
    // Only fill gross if it's empty (don't clobber what the user typed)
    if(!obj.gross) obj.gross = (t.income/12).toFixed(2);

    // Mark consumed so we don't re-apply on plain reload
    t.consumed=true;
    state.lastTaxTs = t.ts || Date.now();
    localStorage.setItem(TAX_KEY,JSON.stringify(t));
    save();

    const banner=document.createElement('div'); banner.className='tax-banner';
    banner.innerHTML=`✓ Tax data applied (annual: $${t.income.toLocaleString()}, tax: $${t.tax.toLocaleString()}). <a href="{{ url_for('tax') }}">Recalculate →</a>`;
    document.getElementById('income-grid').prepend(banner);
    document.getElementById('tax-link').style.display='none';
  }catch{}
}

// ── Expand / Collapse ──────────────────────────────────────────────────────────
function toggleCollapse(rowId){ snapshot(); state.collapsed[rowId]=!isCollapsed(rowId); save(); render(); }
function expandAll(){ snapshot(); state.rows.filter(r=>!r.parentId&&hasChildren(r.id)).forEach(r=>state.collapsed[r.id]=false); save(); render(); }
function collapseAll(){ snapshot(); state.rows.filter(r=>!r.parentId&&hasChildren(r.id)).forEach(r=>state.collapsed[r.id]=true); save(); render(); }

// ── Sub-category menu (portal, position:fixed) ────────────────────────────────
let openMenu=null;
function closeMenu(){ if(openMenu){openMenu.remove();openMenu=null;} }
document.addEventListener('click',e=>{ if(!e.target.closest('.sub-dropdown')&&!e.target.closest('.sub-menu')) closeMenu(); });

function renderOtherForm(menu, row){
  menu.innerHTML='';
  const f=document.createElement('div'); f.className='sub-other-form';
  const inp=document.createElement('input'); inp.type='text'; inp.placeholder='Custom subcategory'; inp.maxLength=40;
  const err=document.createElement('span'); err.className='sub-other-err';
  const btnRow=document.createElement('div'); btnRow.className='row';
  const ok=document.createElement('button'); ok.className='ok'; ok.textContent='Add';
  const cancel=document.createElement('button'); cancel.className='cancel'; cancel.textContent='Cancel';
  btnRow.appendChild(ok); btnRow.appendChild(cancel);
  f.appendChild(inp); f.appendChild(err); f.appendChild(btnRow);
  menu.appendChild(f);
  setTimeout(()=>inp.focus(),20);

  function tryAdd(){
    const name=inp.value.trim(); err.textContent='';
    if(!name){ err.textContent='Enter a name.'; return; }
    const lower=name.toLowerCase();
    const existing=children(row.id).map(c=>c.label.toLowerCase());
    // also check predefined subcategories of the parent (avoid duplicates with built-ins)
    const mainCat=CAT_KEYS.find(k=>k===row.label)||CAT_KEYS.find(k=>CATEGORIES[k].includes(row.label));
    const builtins = mainCat ? CATEGORIES[mainCat].map(s=>s.toLowerCase()) : [];
    if(existing.includes(lower)||builtins.includes(lower)){
      err.textContent='"'+name+'" already exists in this category.'; return;
    }
    addSubRow(row,name); closeMenu();
  }
  ok.addEventListener('click',e=>{e.stopPropagation();tryAdd();});
  cancel.addEventListener('click',e=>{e.stopPropagation();closeMenu();});
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();tryAdd();} if(e.key==='Escape'){closeMenu();} });
}

function showSubMenu(btn, row){
  closeMenu();
  let subs=[];
  const mainCat=CAT_KEYS.find(k=>k===row.label)||CAT_KEYS.find(k=>CATEGORIES[k].includes(row.label));
  if(mainCat) subs=CATEGORIES[mainCat].filter(s=>!children(row.id).some(c=>c.label===s));

  const menu=document.createElement('div'); menu.className='sub-menu';

  if(mainCat&&subs.length){
    subs.forEach(s=>{
      const item=document.createElement('button'); item.className='sub-menu-item'; item.textContent=s;
      item.addEventListener('click',e=>{e.stopPropagation();addSubRow(row,s);closeMenu();});
      menu.appendChild(item);
    });
  } else if(!mainCat) {
    CAT_KEYS.forEach(cat=>{
      const g=document.createElement('div'); g.className='sub-menu-group'; g.textContent=cat; menu.appendChild(g);
      CATEGORIES[cat].forEach(s=>{
        const item=document.createElement('button'); item.className='sub-menu-item'; item.textContent=s;
        item.addEventListener('click',e=>{e.stopPropagation();addSubRow(row,s);closeMenu();});
        menu.appendChild(item);
      });
    });
  }

  // Always offer "Other (custom)…" at the bottom
  const other=document.createElement('button'); other.className='sub-menu-item sub-other'; other.textContent='+ Other (custom)…';
  other.addEventListener('click',e=>{e.stopPropagation();renderOtherForm(menu,row);});
  menu.appendChild(other);

  const rect=btn.getBoundingClientRect();
  menu.style.top=(rect.bottom+4)+'px';
  menu.style.left=rect.left+'px';
  document.body.appendChild(menu);
  openMenu=menu;
}

// ── Structural mutations ───────────────────────────────────────────────────────
function addRow(){
  snapshot();
  const usedLabels=state.rows.filter(r=>!r.parentId).map(r=>r.label);
  const nextCat=CAT_KEYS.find(k=>!usedLabels.includes(k))||'Groceries';
  state.rows.push({id:uid(),label:nextCat,color:CAT_COLORS[nextCat]||'#e5e7eb',height:36,parentId:null});
  save(); render();
}
function addSubRow(parentRow, subLabel){
  snapshot();
  const parentIdx=state.rows.findIndex(r=>r.id===parentRow.id);
  const kids=state.rows.reduce((acc,r,i)=>r.parentId===parentRow.id?[...acc,i]:acc,[]);
  const insertIdx=kids.length?Math.max(...kids)+1:parentIdx+1;
  state.rows.splice(insertIdx,0,{id:uid(),label:subLabel,color:parentRow.color,height:32,parentId:parentRow.id});
  state.collapsed[parentRow.id]=false;
  save(); render();
}
function addCol(){ snapshot(); state.cols.push({id:uid(),label:'New Column',width:100}); save(); render(); }
function deleteRow(id){
  snapshot();
  const kids=state.rows.filter(r=>r.parentId===id).map(r=>r.id);
  const toDelete=[id,...kids];
  state.rows=state.rows.filter(r=>!toDelete.includes(r.id));
  Object.keys(state.cells).forEach(k=>{ if(toDelete.some(d=>k.includes('|'+d+'|'))) delete state.cells[k]; });
  save(); render();
}
function deleteCol(id){
  snapshot(); state.cols=state.cols.filter(c=>c.id!==id);
  Object.keys(state.cells).filter(k=>k.endsWith('|'+id)).forEach(k=>delete state.cells[k]);
  save(); render();
}

// ── Chart ──────────────────────────────────────────────────────────────────────
let chartInstance=null, chartVisible=false, chartMode='monthly';
function toggleChart(){
  chartVisible=!chartVisible;
  document.getElementById('chart-section').style.display=chartVisible?'block':'none';
  document.getElementById('chart-btn').textContent=chartVisible?'📊 Hide Chart':'📊 Chart';
  if(chartVisible) renderChart();
}
function setChartMode(mode){
  chartMode=mode;
  document.getElementById('chart-mode-m').classList.toggle('active',mode==='monthly');
  document.getElementById('chart-mode-y').classList.toggle('active',mode==='yearly');
  renderChart();
}
function rowTotalForMonthKey(rId,monthKey){
  const kids=state.rows.filter(r=>r.parentId===rId);
  if(kids.length) return kids.reduce((s,c)=>s+rowTotalForMonthKey(c.id,monthKey),0);
  return state.cols.reduce((s,col)=>{
    const k=monthKey+'|'+rId+'|'+col.id;
    return s+(parseFloat(state.cells[k])||0);
  },0);
}
function rowTotalForYear(rId,year){
  let t=0; for(let m=0;m<12;m++) t+=rowTotalForMonthKey(rId,mk(year,m)); return t;
}
function renderChart(){
  if(!chartVisible) return;
  const topRows=state.rows.filter(r=>!r.parentId);
  let data, topLabel;
  if(chartMode==='yearly'){
    data=topRows.map(r=>({label:r.label,value:rowTotalForYear(r.id,state.currentYear),color:r.color})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
    topLabel='Top Expenses — '+state.currentYear;
  } else {
    data=topRows.map(r=>({label:r.label,value:rowTotal(r.id),color:r.color})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
    topLabel='Top Expenses — '+MONTHS_SHORT[state.currentMonth]+' '+state.currentYear;
  }
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  if(!data.length){renderTop3([],topLabel);return;}
  chartInstance=new Chart(document.getElementById('exp-chart'),{
    type:'bar',
    data:{labels:data.map(d=>d.label),datasets:[{label:'$ Amount',data:data.map(d=>parseFloat(d.value.toFixed(2))),backgroundColor:data.map(d=>d.color||'#93c5fd'),borderRadius:4}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' $'+ctx.parsed.y.toFixed(2)}}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v}}},responsive:true,maintainAspectRatio:true}
  });
  renderTop3(data,topLabel);
}
function renderTop3(data,label){
  const top=(data||[]).slice(0,3);
  const el=document.getElementById('top3');
  if(!top.length){el.innerHTML='';return;}
  el.innerHTML='<h4>'+(label||'Top 3')+'</h4><ol>'+top.map(t=>`<li><strong>${t.label}</strong> — $${parseFloat(t.value.toFixed(2))}</li>`).join('')+'</ol>';
}

// ── Reset ──────────────────────────────────────────────────────────────────────
let resetTimer=null;
function resetAll(){
  const btn=document.getElementById('reset-btn');
  if(btn.dataset.arm){
    clearTimeout(resetTimer); delete btn.dataset.arm; btn.textContent='Reset'; btn.style.background='#dc2626';
    snapshot(); state=freshState(); save(); render(); syncIncomeInputs();
  } else {
    btn.dataset.arm='1'; btn.textContent='Sure?'; btn.style.background='#991b1b';
    resetTimer=setTimeout(()=>{delete btn.dataset.arm;btn.textContent='Reset';btn.style.background='#dc2626';},2500);
  }
}

// ── Resize ─────────────────────────────────────────────────────────────────────
function attachColResize(handle,col){
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();handle.classList.add('dragging');
    const sx=e.clientX,sw=col.width,cEl=document.getElementById('cg-'+col.id);
    const mv=e=>{col.width=Math.max(55,sw+e.clientX-sx);if(cEl)cEl.style.width=col.width+'px';};
    const up=()=>{handle.classList.remove('dragging');save();document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}
function attachHdrResize(handle){
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();handle.classList.add('dragging');
    const sx=e.clientX,sw=state.headerColWidth,cEl=document.getElementById('cg-hdr');
    const mv=e=>{state.headerColWidth=Math.max(100,sw+e.clientX-sx);if(cEl)cEl.style.width=state.headerColWidth+'px';};
    const up=()=>{handle.classList.remove('dragging');save();document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}
function attachRowResize(handle,row,tr){
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();handle.classList.add('dragging');
    const sy=e.clientY,sh=row.height||36;
    const mv=e=>{row.height=Math.max(26,sh+e.clientY-sy);tr.style.height=row.height+'px';};
    const up=()=>{handle.classList.remove('dragging');save();document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  const table=document.getElementById('sheet'); table.innerHTML='';
  const cg=document.createElement('colgroup');
  const hc=document.createElement('col');hc.id='cg-hdr';hc.style.width=(state.headerColWidth||185)+'px';cg.appendChild(hc);
  state.cols.forEach(col=>{const c=document.createElement('col');c.id='cg-'+col.id;c.style.width=(col.width||100)+'px';cg.appendChild(c);});
  const tc=document.createElement('col');tc.style.width=(state.totalColWidth||110)+'px';cg.appendChild(tc);
  const dc=document.createElement('col');dc.style.width='32px';cg.appendChild(dc);
  table.appendChild(cg);

  // thead
  const thead=document.createElement('thead'),htr=document.createElement('tr');
  const corner=document.createElement('th');
  const ci=document.createElement('div');ci.className='th-inner';
  const cl=document.createElement('span');cl.style.cssText='font-weight:600;color:#6b7280;font-size:.83rem;';cl.textContent='Category';ci.appendChild(cl);
  corner.appendChild(ci);
  const chr=document.createElement('div');chr.className='col-resize';attachHdrResize(chr);corner.appendChild(chr);
  htr.appendChild(corner);
  state.cols.forEach(col=>{
    const th=document.createElement('th');
    const inner=document.createElement('div');inner.className='th-inner';
    const lbl=document.createElement('span');lbl.className='th-label';lbl.contentEditable='true';lbl.textContent=col.label;
    lbl.addEventListener('blur',()=>{col.label=lbl.textContent.trim()||col.label;save();});
    lbl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();lbl.blur();}});
    inner.appendChild(lbl);
    const del=document.createElement('button');del.className='col-del';del.title='Delete column';del.textContent='×';del.addEventListener('click',()=>deleteCol(col.id));inner.appendChild(del);
    th.appendChild(inner);
    const cr=document.createElement('div');cr.className='col-resize';attachColResize(cr,col);th.appendChild(cr);
    htr.appendChild(th);
  });
  const tth=document.createElement('th');tth.className='th-total';
  const thi=document.createElement('div');thi.className='th-inner';
  const thl=document.createElement('span');thl.style.cssText='font-weight:700;color:#166534;font-size:.85rem;';
  thl.textContent='Total';thi.appendChild(thl);tth.appendChild(thi);htr.appendChild(tth);
  const act=document.createElement('th');act.style.cssText='background:#f9fafb;border:1px dashed #d1d5db;';
  const acb=document.createElement('button');acb.className='btn-add-col';acb.textContent='+';acb.title='Add column';acb.addEventListener('click',addCol);act.appendChild(acb);htr.appendChild(act);
  thead.appendChild(htr);table.appendChild(thead);

  // tbody
  const tbody=document.createElement('tbody');
  function renderRow(row){
    const isChild=!!row.parentId, hasKids=hasChildren(row.id), collapsed=isCollapsed(row.id);
    const tr=document.createElement('tr');tr.style.height=(row.height||36)+'px';
    if(isChild) tr.classList.add('child-row');

    const rhTd=document.createElement('td');rhTd.className='rh-cell';rhTd.style.backgroundColor=row.color;
    const rhIn=document.createElement('div');rhIn.className='rh-inner';
    if(hasKids){
      const cb=document.createElement('button');cb.className='collapse-btn';cb.title=collapsed?'Expand':'Collapse';cb.textContent=collapsed?'▸':'▾';
      cb.addEventListener('click',()=>toggleCollapse(row.id));rhIn.appendChild(cb);
    }
    const cInp=document.createElement('input');cInp.type='color';cInp.className='color-hidden';cInp.value=row.color;
    cInp.addEventListener('input',()=>{row.color=cInp.value;rhTd.style.backgroundColor=cInp.value;swatch.style.backgroundColor=cInp.value;});
    cInp.addEventListener('change',save);
    const swatch=document.createElement('div');swatch.className='color-swatch';swatch.style.backgroundColor=row.color;swatch.title='Change colour';
    swatch.addEventListener('click',()=>cInp.click());
    const rowLabel=document.createElement('span');rowLabel.className='row-label';rowLabel.contentEditable='true';rowLabel.textContent=row.label;
    rowLabel.addEventListener('blur',()=>{row.label=rowLabel.textContent.trim()||row.label;save();});
    rowLabel.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();rowLabel.blur();}});
    rhIn.appendChild(cInp);rhIn.appendChild(swatch);rhIn.appendChild(rowLabel);
    if(!isChild){
      const dd=document.createElement('div');dd.className='sub-dropdown';
      const addBtn=document.createElement('button');addBtn.className='sub-add-btn';addBtn.textContent='+Sub';addBtn.title='Add subcategory';
      addBtn.addEventListener('click',e=>{e.stopPropagation();showSubMenu(addBtn,row);});
      dd.appendChild(addBtn);rhIn.appendChild(dd);
    }
    rhTd.appendChild(rhIn);
    const rr=document.createElement('div');rr.className='row-resize';attachRowResize(rr,row,tr);rhTd.appendChild(rr);
    tr.appendChild(rhTd);

    state.cols.forEach(col=>{
      const td=document.createElement('td');
      if(hasKids){
        const span=document.createElement('span');span.className='parent-sum';span.id='ps-'+row.id+'-'+col.id;
        const s=children(row.id).reduce((t,c)=>t+getCell(c.id,col.id),0);
        span.textContent=s>0?fmt(s):'';span.title='Sum of subcategories';td.appendChild(span);
      } else {
        const inp=document.createElement('input');inp.type='number';inp.min='0';inp.step='0.01';inp.className='num-input';
        const stored=getRawCell(row.id,col.id);inp.value=stored!==''?stored:'';
        inp.addEventListener('focus',()=>snapshot());
        inp.addEventListener('change',()=>{
          if(parseFloat(inp.value)<0) inp.value='0';
          setCell(row.id,col.id,inp.value);
          updateAll(row.id);
        });
        td.appendChild(inp);
      }
      tr.appendChild(td);
    });

    const totTd=document.createElement('td');totTd.className='th-total';
    const totSpan=document.createElement('span');totSpan.className='total-val';totSpan.id='rt-'+row.id;
    totSpan.textContent=fmt(rowTotal(row.id));totTd.appendChild(totSpan);tr.appendChild(totTd);

    const delTd=document.createElement('td');delTd.className='del-td';
    const delBtn=document.createElement('button');delBtn.className='row-del';delBtn.title='Delete row';delBtn.textContent='🗑';
    delBtn.addEventListener('click',()=>deleteRow(row.id));delTd.appendChild(delBtn);tr.appendChild(delTd);

    tbody.appendChild(tr);
    if(!isChild&&!collapsed) children(row.id).forEach(renderRow);
  }
  state.rows.filter(r=>!r.parentId).forEach(renderRow);

  const atr=document.createElement('tr');const atd=document.createElement('td');atd.colSpan=state.cols.length+3;atd.style.cssText='border:none;padding:3px 0;';
  const arb=document.createElement('button');arb.className='btn-add-row';arb.textContent='+ Add Row';arb.addEventListener('click',addRow);
  atd.appendChild(arb);atr.appendChild(atd);tbody.appendChild(atr);
  table.appendChild(tbody);

  // tfoot — TOTAL row with per-week column totals + grand total
  const tfoot=document.createElement('tfoot'),ftr=document.createElement('tr');
  const fl=document.createElement('td');fl.style.cssText='font-weight:700;padding:4px 8px;font-size:.85rem;';fl.textContent='TOTAL';ftr.appendChild(fl);
  state.cols.forEach(col=>{
    const ftd=document.createElement('td'); ftd.className='week-total-cell';
    const fs=document.createElement('span');fs.className='gtotal-val';fs.id='ct-'+col.id;
    fs.textContent=fmt(colTotal(col.id));
    ftd.appendChild(fs); ftr.appendChild(ftd);
  });
  const gtd=document.createElement('td');gtd.className='gtotal-cell';
  const gs=document.createElement('span');gs.className='gtotal-val';gs.id='gt';gs.textContent=fmt(grandTotal());gtd.appendChild(gs);ftr.appendChild(gtd);
  ftr.appendChild(document.createElement('td'));
  tfoot.appendChild(ftr);table.appendChild(tfoot);

  updateIncomeSummary();
  if(chartVisible) renderChart();
}

// ── Init ───────────────────────────────────────────────────────────────────────
loadHistory();
loadTaxCarryover();
updateHistBtns();
updateMonthNav();
syncIncomeInputs();
render();
</script>
