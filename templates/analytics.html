{% extends "base.html" %}
{% block title %}Analytics{% endblock %}
{% block head_scripts %}<script src="/static/rates-utils.js"></script>
<script src="/static/js/analytics_core.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>{% endblock %}
{% block head_styles %}
<style>
    body { max-width: 960px; }

    
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: .75rem;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: .9rem 1rem;
    }
    .stat-label  { font-size:.72rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); margin-bottom:.3rem; }
    .stat-value  { font-size:1.45rem; font-weight:800; color:var(--fg); line-height:1.1; overflow-wrap:anywhere; word-break:break-word; }
    .stat-sub    { font-size:.75rem; color:var(--muted); margin-top:.2rem; }

    
    .chart-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-bottom: 1rem;
    }
    .chart-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .75rem;
    }
    .chart-card-header h2 { font-size:1rem; font-weight:700; margin:0; color:var(--fg); }
    .chart-controls { display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; }
    .chart-canvas-wrap { position:relative; height:300px; }
    .chart-canvas-wrap canvas { height:100% !important; max-height:300px; }

    
    .btn-toggle {
      padding: .28rem .65rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--fg);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .btn-toggle:hover { border-color:var(--accent); color:var(--accent); }
    .btn-toggle-active { background:var(--accent); color:#fff !important; border-color:var(--accent); }

    
    .period-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: 1rem;
    }
    .period-label { font-size:.85rem; font-weight:600; color:var(--muted); }
    .period-select {
      padding: .3rem .55rem;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: .85rem;
      background: var(--input-bg);
      color: var(--fg);
      cursor: pointer;
    }

    
    .section-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.5rem 0 .65rem;
      display: flex;
      align-items: center;
      gap: .6rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--panel-border);
    }

    
    #stat-panel-spend, #stat-panel-sub {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: .65rem 1rem;
      margin-bottom: .85rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: .3rem .75rem;
    }
    #stat-panel-spend label, #stat-panel-sub label { font-size: .83rem; display: flex; align-items: center; gap: .4rem; cursor: pointer; color: var(--fg); }
    #stat-panel-spend input[type=checkbox], #stat-panel-sub input[type=checkbox] { cursor: pointer; accent-color: var(--accent); }

    
    .chart-slideshow .chart-card { display:none; margin-bottom:0; }
    .chart-slideshow .chart-card.slide-active { display:block; }
    .slideshow-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: .6rem;
    }
    .slideshow-nav-btn {
      background: none;
      border: 1.5px solid var(--panel-border);
      border-radius: 7px;
      padding: .25rem .6rem;
      cursor: pointer;
      color: var(--fg);
      font-size: .85rem;
      transition: border-color .12s, color .12s;
    }
    .slideshow-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .slideshow-lbl {
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      min-width: 230px;
      text-align: center;
    }

    
    .no-data { text-align:center; padding:2.5rem 1rem; color:var(--muted); font-size:.9rem; }
    .no-data a { color:var(--accent); text-decoration:none; }
    .no-data a:hover { text-decoration:underline; }

    
    .insight-list { list-style:none; padding:0; margin:.65rem 0 0; }
    .insight-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: .35rem 0;
      border-bottom: 1px solid var(--panel-border);
      font-size: .88rem;
      gap: .5rem;
    }
    .insight-list li:last-child { border-bottom:none; }
    .insight-name { color:var(--fg); font-weight:600; }
    .insight-val  { color:var(--muted); white-space:nowrap; }

    
    .chart-note {
      text-align: right;
      font-size: .82rem;
      color: var(--muted);
      margin: .5rem 0 0;
    }
</style>
{% endblock %}
{% block content %}

  <h1>Analytics</h1>
  <div id="root"></div>
{% endblock %}
{% block body_scripts %}
<script>

// Shared utilities (escapeHtml, MONTHS_SHORT, mk, todayMK, fmtMoney*, mkLabel,
// expRows, incRows, allSpendingMonths, buildRowMonthIndex, combinedMonthTotals,
// combinedCategoryTotals, combinedCategoryMonthlyData, calcSubCostForMonth,
// subCostPerMonth, subMonthlySnapshot, filterMonths, incTrackerMonthTotals,
// mergedMonthIncomes, expMonthIncomes) are provided by analytics_core.js.

const EXP_KEY  = 'fiapp_expenses_v4';
const SUBS_KEY = 'fiapp_subs_v4';
const INC_KEY  = 'fiapp_income_v1';

function themeColors(){
  const el=document.documentElement;
  const isDark=el.classList.contains('dark')||el.classList.contains('theme-midnight');
  const style=getComputedStyle(el);
  return {
    fg:    style.getPropertyValue('--fg').trim()||(isDark?'#e2e8f0':'#1f2937'),
    muted: style.getPropertyValue('--muted').trim()||(isDark?'#94a3b8':'#6b7280'),
    grid:  isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)',
    panel: style.getPropertyValue('--panel-bg').trim()||(isDark?'#1e293b':'#f9fafb'),
  };
}
function refreshChartsTheme(){
  const tc=themeColors();
  Object.values(Chart.instances).forEach(function(chart){
    const scales=chart.options.scales||{};
    Object.values(scales).forEach(function(scale){
      if(scale.ticks) scale.ticks.color=tc.muted;
      if(scale.grid)  scale.grid.color=tc.grid;
    });
    if(chart.options.plugins&&chart.options.plugins.legend&&chart.options.plugins.legend.labels)
      chart.options.plugins.legend.labels.color=tc.fg;
    chart.update('none');
  });
}


function loadExp(){
  try{ const s=localStorage.getItem(EXP_KEY); return s?JSON.parse(s):null; }
  catch(e){ console.warn('Analytics: expense data error',e.message); return null; }
}
function loadSubs(){
  try{ const s=localStorage.getItem(SUBS_KEY); return s?JSON.parse(s):null; }
  catch(e){ console.warn('Analytics: subs data error',e.message); return null; }
}
function loadInc(){
  try{ const s=localStorage.getItem(INC_KEY); return s?JSON.parse(s):null; }
  catch(e){ console.warn('Analytics: income data error',e.message); return null; }
}




function periodOptions(allMonths){
  const opts=[{label:'All time',value:'all'}];
  if(allMonths.length>=3)  opts.push({label:'Last 3 months', value:'3'});
  if(allMonths.length>=6)  opts.push({label:'Last 6 months', value:'6'});
  if(allMonths.length>=12) opts.push({label:'Last 12 months',value:'12'});
  return opts;
}
const charts={};
function destroyChart(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }


let trendType    = 'bar';
let catBreakType = 'doughnut';
let subBreakType = 'doughnut';


let _exp, _subs, _inc, _allMonths, _monthTotals, _monthIncomes, _subRows, _subTrendMonths;

let _rowMonthIdx = {};


let _cm=[], _cTc={fg:'#1f2937',muted:'#6b7280',grid:'rgba(0,0,0,.07)',panel:'#f9fafb'},
    _cToday='', _cHasForecast=false, _cStatMs=[], _cActualMs=[];


function setTrendType(t){
  trendType=t;
  document.querySelectorAll('.tt-trend').forEach(b=>b.classList.toggle('btn-toggle-active',b.dataset.v===t));
  renderTrendChart();
}
function setCatBreakType(t){
  catBreakType=t;
  document.querySelectorAll('.tt-cat').forEach(b=>b.classList.toggle('btn-toggle-active',b.dataset.v===t));
  renderBreakdownChart();
}
function setSubBreakType(t){
  subBreakType=t;
  document.querySelectorAll('.tt-sub').forEach(b=>b.classList.toggle('btn-toggle-active',b.dataset.v===t));
  renderSubBreakChart();
}


function mkToggleBtn(groupClass, val, label, isActive, handler){
  const b=document.createElement('button');
  b.className='btn-toggle '+groupClass+(isActive?' btn-toggle-active':'');
  b.dataset.v=val; b.textContent=label;
  b.onclick=handler;
  return b;
}


function renderAll(){
  _exp  = loadExp();
  _subs = loadSubs();
  _inc  = loadInc();

  
  _rowMonthIdx = buildRowMonthIndex(_exp);

  
  _allMonths    = allSpendingMonths(_exp, _subs);
  _monthTotals  = combinedMonthTotals(_exp, _subs, _allMonths);
  _monthIncomes = mergedMonthIncomes(_exp, incTrackerMonthTotals(_inc));
  _subRows      = subMonthlySnapshot(_subs);
  
  _subTrendMonths = _allMonths;

  const root=document.getElementById('root');
  const hasAnyData=_allMonths.length>0||_subRows.length>0;
  const hasSubData=_subRows.length>0||(_subs&&_subs.rows&&_subs.rows.length>0);

  if(!hasAnyData&&!hasSubData){
    root.innerHTML=`<div class="no-data">
      <p style="font-size:2rem;margin-bottom:.5rem">📭</p>
      <p>No data yet - add expenses or subscriptions first.</p>
      <p style="margin-top:.5rem"><a href="/expenses">Go to Expense Tracker →</a></p>
    </div>`;
    return;
  }

  root.innerHTML='';

  
  if(_allMonths.length){
    const periodRow=document.createElement('div');
    periodRow.className='period-row';
    periodRow.setAttribute('data-wt','analytics-period');
    const lbl=document.createElement('span');
    lbl.className='period-label'; lbl.textContent='Period:';
    const sel=document.createElement('select');
    sel.id='period-global'; sel.className='period-select';
    periodOptions(_allMonths).forEach(o=>{
      const opt=document.createElement('option');
      opt.value=o.value; opt.textContent=o.label;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', reRenderCharts);
    periodRow.appendChild(lbl);
    periodRow.appendChild(sel);
    root.appendChild(periodRow);
  }

  

  
  // Phase 6: Financial Patterns panel (above stat grid)
  renderFinancialPatterns(root);

  // Phase 4d: Win cards + Phase 7: Passive memory (both near top, before charts)
  renderWins(root);
  renderMemory(root);

  const statGrid=document.createElement('div');
  statGrid.id='stat-grid'; statGrid.className='stat-grid';
  root.appendChild(statGrid);

  
  function addChartCard(id, title, target){
    target = target || root;
    const card=document.createElement('div');
    card.className='chart-card'; card.id='card-'+id;
    const hdr=document.createElement('div'); hdr.className='chart-card-header';
    const h2=document.createElement('h2'); h2.textContent=title;
    const ctrl=document.createElement('div'); ctrl.className='chart-controls'; ctrl.id='controls-'+id;
    hdr.appendChild(h2); hdr.appendChild(ctrl);
    card.appendChild(hdr);
    const wrap=document.createElement('div'); wrap.className='chart-canvas-wrap';
    const canvas=document.createElement('canvas'); canvas.id='chart-'+id;
    wrap.appendChild(canvas);
    card.appendChild(wrap);
    target.appendChild(card);
    return card;
  }

  function addSectionTitle(text){
    const d=document.createElement('div');
    d.className='section-title'; d.textContent=text;
    root.appendChild(d);
  }

  
  if(_allMonths.length){
    addSectionTitle('Spending');
    const spendSlide=document.createElement('div');
    spendSlide.className='chart-slideshow'; spendSlide.id='spend-slideshow';
    root.appendChild(spendSlide);
    addChartCard('trend',     'Monthly Spending Trend',         spendSlide);
    addChartCard('breakdown', 'Category Breakdown',             spendSlide);
    if(_allMonths.length>=2) addChartCard('cattrends', 'Category Trends Over Time', spendSlide);
    if(Object.keys(_monthIncomes).length) addChartCard('savings', 'Income vs Expenses', spendSlide);
  }

  
  if(hasSubData){
    addSectionTitle('Subscriptions');
    const subStatGrid=document.createElement('div');
    subStatGrid.id='sub-stat-grid'; subStatGrid.className='stat-grid';
    subStatGrid.style.marginBottom='.75rem';
    root.appendChild(subStatGrid);

    const subSlide=document.createElement('div');
    subSlide.className='chart-slideshow'; subSlide.id='sub-slideshow';
    root.appendChild(subSlide);
    if(_subRows.length) addChartCard('subbreak', 'Subscription Breakdown',     subSlide);
    if(_subTrendMonths.length>=2) addChartCard('subtrend', 'Subscription Cost Trend', subSlide);
  }

  reRenderCharts();

  
  (function(){
    function makeSlideshow(slideEl, cardIds, titles){
      if(!slideEl) return;
      
      const pairs = cardIds.map((id,i)=>({id,title:titles[i]}))
                           .filter(p=>document.getElementById('card-'+p.id));
      if(pairs.length < 2){ if(pairs.length===1) document.getElementById('card-'+pairs[0].id).classList.add('slide-active'); return; }

      
      const nav=document.createElement('div'); nav.className='slideshow-nav';
      const prev=document.createElement('button'); prev.className='slideshow-nav-btn'; prev.textContent='◀';
      const lbl=document.createElement('span'); lbl.className='slideshow-lbl'; lbl.id=slideEl.id+'-lbl';
      const next=document.createElement('button'); next.className='slideshow-nav-btn'; next.textContent='▶';
      nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
      slideEl.insertBefore(nav, slideEl.firstChild);

      let idx=0;
      function show(n){
        idx=((n%pairs.length)+pairs.length)%pairs.length;
        pairs.forEach((p,i)=>{
          const el=document.getElementById('card-'+p.id);
          if(!el) return;
          const active=i===idx;
          el.classList.toggle('slide-active', active);
          if(active){
            
            const ch=Chart.getChart('chart-'+p.id);
            if(ch) setTimeout(()=>ch.resize(),0);
          }
        });
        lbl.textContent=pairs[idx].title+' ('+  (idx+1)+' / '+pairs.length+')';
      }
      prev.onclick=()=>show(idx-1);
      next.onclick=()=>show(idx+1);
      show(0);
    }

    makeSlideshow(
      document.getElementById('spend-slideshow'),
      ['trend','breakdown','cattrends','savings'],
      ['Monthly Spending Trend','Category Breakdown','Category Trends Over Time','Income vs Expenses']
    );
    makeSlideshow(
      document.getElementById('sub-slideshow'),
      ['subbreak','subtrend'],
      ['Subscription Breakdown','Subscription Cost Trend']
    );
  })();

}


function _refreshPeriodCache(){
  const period=(document.getElementById('period-global')||{}).value||'all';
  _cm         = filterMonths(_allMonths, period);
  _cTc        = themeColors();
  _cToday     = todayMK();
  _cActualMs  = _cm.filter(m=>m<=_cToday);
  _cStatMs    = _cActualMs.length ? _cActualMs : _cm;
  _cHasForecast = _cm.some(m=>m>_cToday);
}


const HIDDEN_STATS_KEY='fiapp_analytics_hidden_stats';
function hiddenStats(){ return JSON.parse(localStorage.getItem(HIDDEN_STATS_KEY)||'[]'); }
function setHiddenStats(arr){ localStorage.setItem(HIDDEN_STATS_KEY,JSON.stringify(arr)); }
function toggleStatPanel(panelId){
  const p=document.getElementById(panelId); if(!p) return;
  const open=p.style.display==='none';
  p.style.display=open?'':'none';
  if(open) buildStatPanel(panelId);
}
function buildStatPanel(panelId){
  const p=document.getElementById(panelId); if(!p) return;
  const gridId=panelId==='stat-panel-spend'?'stat-grid':'sub-stat-grid';
  const hidden=hiddenStats();
  const cards=[...document.querySelectorAll('#'+gridId+' .stat-card')];
  if(!cards.length){ p.innerHTML='<span style="font-size:.83rem;color:var(--muted)">No stat boxes yet.</span>'; return; }
  p.innerHTML='';
  cards.forEach(card=>{
    const id=card.dataset.statId;
    if(!id) return;
    const label=card.querySelector('.stat-label')&&card.querySelector('.stat-label').textContent||id;
    const wrap=document.createElement('label');
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!hidden.includes(id);
    cb.addEventListener('change',function(){
      const h=hiddenStats();
      if(!cb.checked){ if(!h.includes(id)) h.push(id); }
      else { const i=h.indexOf(id); if(i>=0) h.splice(i,1); }
      setHiddenStats(h);
      card.style.display=cb.checked?'':'none';
    });
    wrap.appendChild(cb);
    wrap.appendChild(document.createTextNode(' '+label));
    p.appendChild(wrap);
  });
}


function renderStatCards(){
  const statGrid=document.getElementById('stat-grid'); if(!statGrid) return;
  statGrid.innerHTML='';
  const hidden=hiddenStats();
  const sc=(id,label,value,sub)=>{
    const c=document.createElement('div'); c.className='stat-card'; c.dataset.statId=id;
    if(hidden.includes(id)) c.style.display='none';
    c.innerHTML=`<div class="stat-label">${escapeHtml(label)}</div>`+
      `<div class="stat-value">${escapeHtml(String(value))}</div>`+
      (sub?`<div class="stat-sub">${escapeHtml(String(sub))}</div>`:'');
    return c;
  };
  if(_cStatMs.length){
    const totalSpend=_cStatMs.reduce((s,m)=>s+(_monthTotals[m]||0),0);
    const avgMonthly=totalSpend/(_cStatMs.length||1);
    statGrid.appendChild(sc('total-spent','Total Spent',fmtMoney(totalSpend),
      _cStatMs.length+' month'+(_cStatMs.length!==1?'s':'')+(_cHasForecast?' · actuals only':'')));
    statGrid.appendChild(sc('monthly-avg','Monthly Avg',fmtMoney(avgMonthly),
      'per month'+(_cHasForecast?' · actuals only':'')));
    const catTotals=combinedCategoryTotals(_exp,_subs,_cStatMs);
    const catSorted=Object.entries(catTotals).sort((a,b)=>b[1].value-a[1].value);
    if(catSorted.length)
      statGrid.appendChild(sc('top-cat','Top Category',catSorted[0][0],fmtMoney(catSorted[0][1].value)+' spent'));
    const withData=_cStatMs.map(m=>({m,v:_monthTotals[m]||0})).filter(x=>x.v>0);
    if(withData.length>=2){
      const best =withData.reduce((a,b)=>a.v<b.v?a:b);
      const worst=withData.reduce((a,b)=>a.v>b.v?a:b);
      statGrid.appendChild(sc('best-month', 'Best Month', mkLabel(best.m), fmtMoney(best.v)+' · lowest'));
      statGrid.appendChild(sc('worst-month','Worst Month',mkLabel(worst.m),fmtMoney(worst.v)+' · highest'));
    }
    const incMonths=_cStatMs.filter(m=>_monthIncomes[m]);
    if(incMonths.length){
      const totInc=incMonths.reduce((s,m)=>s+(_monthIncomes[m]||0),0);
      const totExp=incMonths.reduce((s,m)=>s+(_monthTotals[m]||0),0);
      const rate=totInc>0?Math.max(0,(totInc-totExp)/totInc*100):0;
      statGrid.appendChild(sc('savings-rate','Savings Rate',fmtPct(rate),
        'across '+incMonths.length+' month'+(incMonths.length!==1?'s':'')));
    }
  }
  if(_subRows.length){
    const totalMo=_subRows.reduce((s,r)=>s+r.monthly,0);
    statGrid.appendChild(sc('active-subs','Active Subs',_subRows.length,
      _subRows.length===1?'subscription':'subscriptions'));
    statGrid.appendChild(sc('sub-monthly','Sub Monthly',fmtMoneyCard(totalMo)+'/mo',fmtMoneyCard(totalMo*12)+'/yr'));
    if(_cStatMs.length){
      const avgExp=_cStatMs.reduce((s,m)=>s+(_monthTotals[m]||0),0)/(_cStatMs.length||1);
      if(avgExp>0) statGrid.appendChild(sc('subs-pct','Subs % of Spend',
        fmtPct(totalMo/avgExp*100),'of avg monthly expenses'));
    }
    const costliest=_subRows.reduce((a,b)=>a.monthly>b.monthly?a:b,_subRows[0]);
    if(costliest) statGrid.appendChild(sc('costliest-sub','Costliest Sub',costliest.name,fmtMoney(costliest.monthly)+'/mo'));
  }
  
  (function(){
    var grid=document.getElementById('stat-grid');
    if(!grid||document.getElementById('stat-panel-spend')){
      var p=document.getElementById('stat-panel-spend');
      if(p&&p.style.display!=='none') buildStatPanel('stat-panel-spend');
      return;
    }
    var bar=document.createElement('div');
    bar.style.cssText='display:flex;justify-content:flex-end;margin-bottom:.35rem;';
    var btn=document.createElement('button');
    btn.className='btn-ghost btn-sm'; btn.textContent='⚙ Customize';
    btn.onclick=function(){toggleStatPanel('stat-panel-spend');};
    bar.appendChild(btn);
    var panel=document.createElement('div');
    panel.id='stat-panel-spend'; panel.style.display='none';
    grid.parentNode.insertBefore(bar,grid);
    grid.parentNode.insertBefore(panel,grid);
  })();
}


function renderSubStatCards(){
  const subStatGrid=document.getElementById('sub-stat-grid');
  if(!subStatGrid||!_subRows.length) return;
  subStatGrid.innerHTML='';
  const hidden=hiddenStats();
  const ssc=(id,label,value,sub)=>{
    const c=document.createElement('div'); c.className='stat-card'; c.dataset.statId=id;
    if(hidden.includes(id)) c.style.display='none';
    c.innerHTML=`<div class="stat-label">${escapeHtml(label)}</div>`+
      `<div class="stat-value">${escapeHtml(String(value))}</div>`+
      (sub?`<div class="stat-sub">${escapeHtml(String(sub))}</div>`:'');
    return c;
  };
  const totalMo=_subRows.reduce((s,r)=>s+r.monthly,0);
  [ssc('s-active',      'Active',       _subRows.length, _subRows.length===1?'subscription':'subscriptions'),
   ssc('s-monthly-cost','Monthly Cost', fmtMoneyCard(totalMo),'per month'),
   ssc('s-annual-cost', 'Annual Cost',  fmtMoneyCard(totalMo*12),'per year'),
  ].forEach(c=>subStatGrid.appendChild(c));
  if(_cStatMs&&_cStatMs.length){
    const avgExp=_cStatMs.reduce((s,m)=>s+(_monthTotals[m]||0),0)/(_cStatMs.length||1);
    if(avgExp>0) subStatGrid.appendChild(ssc('s-pct-exp','% of Expenses',fmtPct(totalMo/avgExp*100),'of avg monthly spend'));
  }
  (function(){
    var grid=document.getElementById('sub-stat-grid');
    if(!grid||document.getElementById('stat-panel-sub')){
      var p=document.getElementById('stat-panel-sub');
      if(p&&p.style.display!=='none') buildStatPanel('stat-panel-sub');
      return;
    }
    var bar=document.createElement('div');
    bar.style.cssText='display:flex;justify-content:flex-end;margin-bottom:.35rem;';
    var btn=document.createElement('button');
    btn.className='btn-ghost btn-sm'; btn.textContent='⚙ Customize';
    btn.onclick=function(){toggleStatPanel('stat-panel-sub');};
    bar.appendChild(btn);
    var panel=document.createElement('div');
    panel.id='stat-panel-sub'; panel.style.display='none';
    grid.parentNode.insertBefore(bar,grid);
    grid.parentNode.insertBefore(panel,grid);
  })();
}


function _chartNoData(canvas, msg){
  destroyChart(canvas.id.replace('chart-',''));
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const muted=getComputedStyle(document.documentElement).getPropertyValue('--muted').trim()||'#9ca3af';
  ctx.fillStyle=muted; ctx.font='14px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(msg||'No data yet', canvas.width/2, canvas.height/2);
}

function renderTrendChart(){
  const trendCanvas=document.getElementById('chart-trend');
  if(!trendCanvas) return;
  if(!_cm.length) return _chartNoData(trendCanvas,'Add expenses to see spending trends');
  const ctrl=document.getElementById('controls-trend');
  if(ctrl&&!ctrl.querySelector('.tt-trend')){
    ctrl.appendChild(mkToggleBtn('tt-trend','bar', '📊 Bar',  trendType==='bar',  ()=>setTrendType('bar')));
    ctrl.appendChild(mkToggleBtn('tt-trend','line','📈 Line', trendType==='line', ()=>setTrendType('line')));
  } else if(ctrl){
    ctrl.querySelectorAll('.tt-trend').forEach(b=>b.classList.toggle('btn-toggle-active',b.dataset.v===trendType));
  }
  destroyChart('trend');
  const labels     =_cm.map(mkLabel);
  const lastActualTrendIdx=_cm.reduce((last,m,i)=>m<=_cToday?i:last,-1);
  const actualVals =_cm.map(m=>m<=_cToday?parseFloat((_monthTotals[m]||0).toFixed(2)):null);
  
  const forecastVals=_cm.map((m,i)=>m>_cToday?parseFloat((_monthTotals[m]||0).toFixed(2)):(trendType==='line'&&i===lastActualTrendIdx)?parseFloat((_monthTotals[m]||0).toFixed(2)):null);

  
  const nonNull=actualVals.filter(v=>v!==null);
  const maData=nonNull.length>=3 ? actualVals.map((v,i,arr)=>{
    if(v===null) return null;
    const win=arr.slice(Math.max(0,i-2),i+1).filter(x=>x!==null);
    return win.length>=2 ? parseFloat((win.reduce((a,b)=>a+b,0)/win.length).toFixed(2)) : null;
  }) : null;

  const makeDs=(label,data,color,rgba)=>{
    const ds={label,data,borderColor:color,borderWidth:2};
    if(trendType==='bar'){
      ds.backgroundColor=rgba; ds.borderRadius=4; ds.borderWidth=1;
      ds.stack='combined'; ds.minBarLength=6;
    } else {
      ds.backgroundColor='transparent'; ds.fill=false;
      ds.tension=0.3; ds.pointRadius=4; ds.pointBackgroundColor=color;
    }
    return ds;
  };
  const datasets=[makeDs('Actual',actualVals,'#7c3aed','rgba(124,58,237,.7)')];
  if(_cHasForecast) datasets.push(makeDs('Forecast',forecastVals,'#f59e0b','rgba(251,191,36,.55)'));
  if(maData) datasets.push({
    label:'3-mo avg', data:maData,
    borderColor:'rgba(107,114,128,.65)', borderWidth:2, borderDash:[5,4],
    backgroundColor:'transparent', fill:false, tension:0.4,
    pointRadius:0, type:'line',
  });
  charts['trend']=new Chart(trendCanvas,{
    type:trendType==='bar'?'bar':'line',
    data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,plugins:{
      legend:{display:_cHasForecast||(maData!=null),labels:{color:_cTc.fg,boxWidth:14,padding:10}},
      tooltip:{callbacks:{label:ctx=>' '+ctx.dataset.label+': '+fmtMoney(ctx.parsed.y)}}
    },scales:{
      x:{ticks:{color:_cTc.fg},grid:{color:_cTc.grid},border:{color:_cTc.grid}},
      y:{beginAtZero:true,stacked:trendType==='bar',ticks:{color:_cTc.fg,callback:v=>fmtMoneyShort(v)},grid:{color:_cTc.grid},border:{color:_cTc.grid}}
    }}
  });
}

// ── Phase 6: Financial Patterns panel ──────────────────────────────────────
function renderFinancialPatterns(root){
  if(_allMonths.length < 2) return;
  const panel=document.createElement('details');
  panel.style.cssText='margin-bottom:1rem;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:8px;padding:.75rem 1rem;';
  const summary=document.createElement('summary');
  summary.style.cssText='cursor:pointer;font-weight:700;font-size:.88rem;color:var(--fg);list-style:none;display:flex;align-items:center;justify-content:space-between;';
  summary.innerHTML='Your financial patterns <span style="font-size:.75rem;color:var(--muted);font-weight:400">▼ show</span>';
  panel.appendChild(summary);
  summary.addEventListener('click',function(){
    const arrow=summary.querySelector('span');
    setTimeout(()=>{ if(arrow) arrow.textContent=panel.open?'▲ hide':'▼ show'; },0);
  });

  const grid=document.createElement('div');
  grid.className='stat-grid'; grid.style.marginTop='.75rem';

  function addIndicator(icon, text){
    const card=document.createElement('div'); card.className='stat-card';
    card.innerHTML='<div style="font-size:1.1rem;margin-bottom:.35rem">'+icon+'</div>'
      +'<div style="font-size:.82rem;color:var(--fg);line-height:1.4">'+text+'</div>';
    grid.appendChild(card);
  }

  // 1. Tracking streak
  let streak=1;
  for(let i=_allMonths.length-1;i>0;i--){
    if(prevMK(_allMonths[i])===_allMonths[i-1]){streak++;} else break;
  }
  addIndicator('🔥', streak>=2?streak+'-month streak of data':'Data tracked');

  // 2. Goals met last full month
  const lastFull=_allMonths[_allMonths.length-1];
  let goalsSet=0, goalsMet=0;
  if(_exp&&_exp.goals){
    Object.keys(_exp.goals).forEach(gk=>{
      if(!gk.startsWith(lastFull+'|')) return;
      const parts=gk.split('|'); const rowId=parts[1];
      const goalAmt=parseFloat(_exp.goals[gk])||0; if(!goalAmt) return;
      goalsSet++;
      let rowTotal=0;
      const cols2=(_exp.colsByMonth&&_exp.colsByMonth[lastFull])||_exp.cols||[];
      cols2.forEach(col=>{ rowTotal+=parseFloat((_exp.cells||{})[lastFull+'|'+rowId+'|'+col.id]||0)||0; });
      if(rowTotal<=goalAmt) goalsMet++;
    });
  }
  if(goalsSet>0) addIndicator('🎯', goalsMet+' of '+goalsSet+' categories under goal in '+mkLabel(lastFull));

  // 3. Monthly coverage
  if(_allMonths.length>=2){
    const first=_allMonths[0]; const last=_allMonths[_allMonths.length-1];
    const [fy,fm]=first.split('-').map(Number); const [ly,lm]=last.split('-').map(Number);
    const totalPossible=(ly-fy)*12+(lm-fm)+1;
    addIndicator('📅', _allMonths.length+' of '+totalPossible+' months tracked');
  }

  // 4. Subscription spend trend (last 3 months)
  if(_subs&&_allMonths.length>=3){
    const last3=_allMonths.slice(-3);
    const costs=subCostPerMonth(_subs,last3);
    if(costs[0]>0&&costs[2]>0){
      const delta=costs[2]-costs[0];
      const dir=delta<0?'📉 down':'📈 up';
      addIndicator('💳', 'Subscriptions '+dir+' $'+Math.abs(delta).toFixed(0)+'/mo over last 3 months');
    }
  }

  // 5. Savings rate last full month
  const lastInc=_monthIncomes[lastFull]||0;
  const lastSpend=_monthTotals[lastFull]||0;
  if(lastInc>0){
    const rate=Math.round(((lastInc-lastSpend)/lastInc)*100);
    addIndicator('💰', rate+'% of income not spent in '+mkLabel(lastFull));
  }

  panel.appendChild(grid);
  root.appendChild(panel);
}

// ── Phase 4d: Win cards ────────────────────────────────────────────────────
function renderWins(root){
  const today=new Date();
  const py=today.getMonth()===0?today.getFullYear()-1:today.getFullYear();
  const pm=today.getMonth()===0?11:today.getMonth()-1;
  const prevMk=String(py)+'-'+String(pm+1).padStart(2,'0');
  if(!_allMonths.includes(prevMk)) return;

  const wins=[];

  // Win 1: categories under goal last month
  const goals=(_exp&&_exp.goals)||{};
  const cells=(_exp&&_exp.cells)||{};
  let underCount=0;
  expRows(prevMk).forEach(function(row){
    if(row.parentId) return;
    const goalAmt=parseFloat(goals[prevMk+'|'+row.id])||0;
    if(!goalAmt) return;
    let tot=0;
    Object.keys(cells).forEach(function(k){
      const p=k.split('|');
      if(p.length===3&&p[0]===prevMk&&p[1]===row.id) tot+=parseFloat(cells[k])||0;
    });
    if(tot>0&&tot<goalAmt) underCount++;
  });
  if(underCount>=1) wins.push('🎯 Under budget in '+underCount+' categor'+(underCount===1?'y':'ies')+' last month.');

  // Win 2: subscription cost dropped vs month before
  if(_subs&&_subs.rows){
    const ppy=pm===0?py-1:py, ppm=pm===0?11:pm-1;
    const ppMk=String(ppy)+'-'+String(ppm+1).padStart(2,'0');
    const subPrev=(subCostPerMonth(_subs,[prevMk])||{})[prevMk]||0;
    const subPP=(subCostPerMonth(_subs,[ppMk])||{})[ppMk]||0;
    if(subPrev>0&&subPP>0&&subPP>subPrev)
      wins.push('📉 Subscriptions dropped $'+(subPP-subPrev).toFixed(0)+' vs the month before.');
  }

  // Win 3: savings rate > 20%
  const prevGross=_monthIncomes[prevMk]||0;
  const prevSpent=_monthTotals[prevMk]||0;
  if(prevGross>0&&prevSpent>0){
    const rate=(prevGross-prevSpent)/prevGross;
    if(rate>0.20) wins.push('💰 Saved '+Math.round(rate*100)+'% of income last month.');
  }

  if(!wins.length) return;
  const details=document.createElement('details');
  details.open=true;
  details.style.cssText='margin-bottom:1rem;';
  const summary=document.createElement('summary');
  summary.className='section-title';
  summary.style.cssText='cursor:pointer;user-select:none;';
  summary.textContent='Last month\'s wins';
  details.appendChild(summary);
  const ul=document.createElement('ul'); ul.className='insight-list';
  wins.forEach(function(w){ const li=document.createElement('li'); li.textContent=w; ul.appendChild(li); });
  details.appendChild(ul);
  root.appendChild(details);
}

// ── Phase 7: Passive Memory panel ──────────────────────────────────────────
function renderMemory(root){
  if(_allMonths.length < 2) return;
  const section=document.createElement('div');
  section.style.cssText='margin-top:1.5rem;';
  const title=document.createElement('div'); title.className='section-title'; title.textContent='What the numbers remember';
  section.appendChild(title);
  const ul=document.createElement('ul'); ul.className='insight-list';
  const observations=[];

  // 1. Most consistent category
  const rowIdx=buildRowMonthIndex(_exp);
  let mostConsistentLabel='', mostConsistentCount=0;
  Object.entries(rowIdx).forEach(([label,months])=>{
    if(months.length>mostConsistentCount){ mostConsistentCount=months.length; mostConsistentLabel=label; }
  });
  if(mostConsistentLabel&&mostConsistentCount>=2)
    observations.push(mostConsistentLabel+' has appeared in '+mostConsistentCount+' of your tracked months.');

  // 2. Spending context for most recent month
  const recentMK=_allMonths[_allMonths.length-1];
  const recentTotal=_monthTotals[recentMK]||0;
  if(_allMonths.length>=3&&recentTotal>0){
    const histTotals=_allMonths.slice(0,-1).map(m=>_monthTotals[m]||0).filter(v=>v>0);
    if(histTotals.length>=2){
      const avg=histTotals.reduce((s,v)=>s+v,0)/histTotals.length;
      let context;
      if(recentTotal>avg*1.15) context='Higher than your usual range.';
      else if(recentTotal<avg*0.85) context='One of your lower months.';
      else context='Typical for your past months.';
      observations.push(mkLabel(recentMK)+': $'+recentTotal.toFixed(0)+' spent — '+context);
    }
  }

  // 3. Income trajectory
  const incMonths=_allMonths.filter(m=>(_monthIncomes[m]||0)>0);
  if(incMonths.length>=3){
    const incVals=incMonths.map(m=>_monthIncomes[m]||0);
    let totalDelta=0;
    for(let i=1;i<incVals.length;i++) totalDelta+=incVals[i]-incVals[i-1];
    const avgDelta=totalDelta/(incVals.length-1);
    if(Math.abs(avgDelta)>5) observations.push('Income has '+( avgDelta>0?'grown':'dropped')+' ~$'+Math.abs(avgDelta).toFixed(0)+'/month on average.');
  }

  // 4. Best savings month
  let bestMK='', bestRate=-Infinity;
  _allMonths.forEach(mk2=>{
    const inc2=_monthIncomes[mk2]||0; const spend2=_monthTotals[mk2]||0;
    if(inc2>0){ const r=(inc2-spend2)/inc2; if(r>bestRate){bestRate=r;bestMK=mk2;} }
  });
  if(bestMK&&bestRate>0) observations.push('Your best savings month was '+mkLabel(bestMK)+' (saved '+Math.round(bestRate*100)+'%).');

  // 5. Subscription anniversary (any sub running ≥12 months)
  if(_subs&&_subs.rows&&_subs.cols){
    const today=new Date();
    const dateCol=(_subs.cols||[]).find(c=>c.ctype==='date');
    const nameCol=(_subs.cols||[]).find(c=>c.ctype==='text');
    const statusCol=(_subs.cols||[]).find(c=>c.ctype==='status');
    if(dateCol){
      (_subs.rows||[]).forEach(row=>{
        const get=col=>col?(_subs.cells||{})[row.id+'|'+col.id]||'':'';
        if(statusCol&&get(statusCol)==='Cancelled') return;
        const startStr=get(dateCol); if(!startStr) return;
        const start=new Date(startStr); if(isNaN(start)) return;
        const mos=(today.getFullYear()-start.getFullYear())*12+(today.getMonth()-start.getMonth());
        if(mos>=12){
          const name=nameCol?get(nameCol)||'A subscription':'A subscription';
          observations.push(escapeHtml(name)+' has been running for '+mos+' months.');
        }
      });
    }
  }

  if(!observations.length) return;
  observations.slice(0,5).forEach(obs=>{
    const li=document.createElement('li'); li.textContent=obs; ul.appendChild(li);
  });
  section.appendChild(ul);
  root.appendChild(section);
}

function reRenderCharts(){
  _refreshPeriodCache();
  renderStatCards();
  renderSubStatCards();
  renderTrendChart();
  renderBreakdownChart();
  renderCatTrendsChart();
  renderSavingsChart();
  renderSubBreakChart();
  renderSubTrendChart();
}


(async()=>{
  
  try{


    const _wtActive=(function(){try{const w=JSON.parse(localStorage.getItem('fiapp_walkthrough_v1')||'null');return !!(w&&w.active);}catch(e){return false;}})();
    const me=await fetch('/auth/me').then(r=>r.json());
    if(me&&me.username&&!_wtActive){
      const root=document.getElementById('root');
      if(root) root.innerHTML='<p style="padding:1rem;color:var(--muted)">Loading…</p>';
      const [expRes,subRes,incRes]=await Promise.all([
        fetch('/api/load/expenses'),
        fetch('/api/load/subs'),
        fetch('/api/load/income')
      ]);
      if(expRes.ok){const r=await expRes.json();const d=r&&r.data;if(d&&typeof d==='object') localStorage.setItem(EXP_KEY,JSON.stringify(d));}
      if(subRes.ok){const r=await subRes.json();const d=r&&r.data;if(d&&typeof d==='object') localStorage.setItem(SUBS_KEY,JSON.stringify(d));}
      if(incRes.ok){const r=await incRes.json();const d=r&&r.data;if(d&&typeof d==='object') localStorage.setItem(INC_KEY,JSON.stringify(d));}
    }

    if(_wtActive && typeof window._wtSeedAnalytics==='function') window._wtSeedAnalytics();
  }catch(e){}
  await fiappCoreLoadRates();
  renderAll();
})();


window.addEventListener('storage', e=>{
  if(e.key===EXP_KEY||e.key===SUBS_KEY||e.key===INC_KEY) renderAll();
});

// Re-render charts when theme class changes on <html>
new MutationObserver(function(ms){
  ms.forEach(function(m){ if(m.attributeName==='class') reRenderCharts(); });
}).observe(document.documentElement,{attributes:true,attributeFilter:['class']});
