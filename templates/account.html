<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Account — FiApp</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script>
    (function(){
      var pref=localStorage.getItem('fiapp_theme');
      var dark=pref==='dark'||(!pref&&matchMedia('(prefers-color-scheme: dark)').matches);
      if(dark) document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { max-width: 520px; }

    .account-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1.25rem;
    }
    .account-card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 .9rem;
      color: var(--fg);
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .9rem;
      color: var(--fg);
      margin-bottom: .5rem;
    }
    .info-label {
      font-weight: 600;
      color: var(--muted);
      width: 100px;
      flex-shrink: 0;
    }

    /* Delete section */
    .danger-card {
      border-color: var(--error-border);
      background: var(--error-bg);
    }
    .danger-card h2 { color: var(--error-fg); }

    .danger-warning {
      font-size: .85rem;
      color: var(--error-fg);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .delete-form { display: flex; flex-direction: column; gap: .75rem; }
    .delete-form label { font-size: .85rem; font-weight: 600; color: var(--error-fg); margin-bottom: 2px; }
    .delete-form input {
      background: var(--input-bg);
      border: 1px solid var(--error-border);
      color: var(--fg);
    }
    .delete-form input:focus { border-color: #dc2626; }

    #delete-steps { display: flex; flex-direction: column; gap: .5rem; }

    .btn-danger {
      background: #dc2626;
      color: #fff;
      padding: .6rem 1.1rem;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-danger:hover { background: #b91c1c; }
    .btn-danger:disabled { opacity: .5; cursor: not-allowed; }

    #delete-error {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-fg);
      border-radius: 6px;
      padding: .55rem .75rem;
      font-size: .85rem;
    }
    #delete-confirm-step { display: none; }
    #delete-confirm-step p {
      font-size: .85rem;
      color: var(--error-fg);
      font-weight: 600;
      margin: 0 0 .5rem;
    }
    .confirm-btns { display: flex; gap: .5rem; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">← Home</a>
    <span class="auth-badge">👤 {{ current_user }}</span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
  </div>
  <script>
  function toggleTheme(){
    const d=document.documentElement.classList.toggle('dark');
    localStorage.setItem('fiapp_theme',d?'dark':'light');
    document.querySelectorAll('.theme-toggle').forEach(b=>b.textContent=d?'☀️':'🌙');
  }
  if(document.documentElement.classList.contains('dark')) document.querySelectorAll('.theme-toggle').forEach(b=>b.textContent='☀️');
  </script>

  <h1>Account</h1>

  <!-- Account info -->
  <div class="account-card">
    <h2>Account Info</h2>
    <div class="info-row">
      <span class="info-label">Username</span>
      <span><strong>{{ current_user }}</strong></span>
    </div>
    <div style="margin-top:.75rem;display:flex;gap:.5rem;flex-wrap:wrap;">
      <button class="btn-ghost btn-sm" onclick="logOut()">Log out</button>
    </div>
  </div>

  <!-- Delete account -->
  <div class="account-card danger-card">
    <h2>⚠ Delete Account</h2>
    <p class="danger-warning">
      This permanently deletes your account and all saved data (expenses, subscriptions, income).
      This action <strong>cannot be undone</strong>.
    </p>

    <div id="delete-error"></div>

    <div class="delete-form">
      <div>
        <label for="del-pw">Confirm your password to continue</label>
        <input type="password" id="del-pw" placeholder="Your password" autocomplete="current-password">
      </div>

      <div id="delete-steps">
        <!-- Step 1: arm -->
        <div id="delete-arm-step">
          <button class="btn-danger" id="del-arm-btn" onclick="armDelete()">Delete my account</button>
        </div>
        <!-- Step 2: final confirm -->
        <div id="delete-confirm-step">
          <p>Are you absolutely sure? This will permanently delete everything.</p>
          <div class="confirm-btns">
            <button class="btn-danger" id="del-confirm-btn" onclick="confirmDelete()">Yes, delete permanently</button>
            <button class="btn-ghost btn-sm" onclick="cancelDelete()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
function logOut(){
  localStorage.removeItem('fiapp_expenses_v4');
  localStorage.removeItem('fiapp_subs_v4');
  localStorage.removeItem('fiapp_income_v1');
  localStorage.removeItem('fiapp_income_push_v1');
  fetch('/auth/logout',{method:'POST'}).then(()=>{ window.location='/login'; });
}

function showDeleteError(msg){
  const el=document.getElementById('delete-error');
  el.textContent=msg; el.style.display='block';
}
function hideDeleteError(){
  const el=document.getElementById('delete-error');
  el.style.display='none'; el.textContent='';
}

function armDelete(){
  hideDeleteError();
  const pw=document.getElementById('del-pw').value;
  if(!pw){ showDeleteError('Please enter your password first.'); return; }
  // Show confirmation step
  document.getElementById('delete-arm-step').style.display='none';
  document.getElementById('delete-confirm-step').style.display='block';
}

function cancelDelete(){
  document.getElementById('delete-arm-step').style.display='';
  document.getElementById('delete-confirm-step').style.display='none';
  hideDeleteError();
}

async function confirmDelete(){
  hideDeleteError();
  const pw=document.getElementById('del-pw').value;
  if(!pw){ showDeleteError('Password required.'); cancelDelete(); return; }
  const btn=document.getElementById('del-confirm-btn');
  btn.disabled=true; btn.textContent='Deleting…';
  try{
    const res=await fetch('/auth/delete_account',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    const data=await res.json();
    if(!res.ok||!data.ok){
      showDeleteError(data.error||'Deletion failed. Check your password and try again.');
      cancelDelete();
      btn.disabled=false; btn.textContent='Yes, delete permanently';
      return;
    }
    // Account deleted — clear all localStorage and redirect
    localStorage.removeItem('fiapp_expenses_v4');
    localStorage.removeItem('fiapp_subs_v4');
    localStorage.removeItem('fiapp_income_v1');
    localStorage.removeItem('fiapp_income_push_v1');
    localStorage.removeItem('fiapp_income_undo_v1');
    localStorage.removeItem('fiapp_income_redo_v1');
    localStorage.removeItem('fiapp_subs_undo_v4');
    localStorage.removeItem('fiapp_subs_redo_v4');
    window.location='/login?deleted=1';
  }catch(e){
    showDeleteError('Network error. Please try again.');
    cancelDelete();
    btn.disabled=false; btn.textContent='Yes, delete permanently';
  }
}
</script>
</body>
</html>
