{% extends "base.html" %}

{% block title %}Currency Converter{% endblock %}

{% block head_scripts %}
  <script src="/static/rates-utils.js"></script>
{% endblock %}

{% block head_styles %}
  <style>
    .curr-row{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-top:.25rem;}
    .curr-row select{padding:6px 8px;border:1px solid var(--input-border);border-radius:4px;font-size:.92rem;background:var(--input-bg);color:var(--fg);width:auto;}
    .curr-row input[type="text"]{padding:6px 8px;border:1px solid var(--input-border);border-radius:4px;font-size:.92rem;width:90px;text-transform:uppercase;background:var(--input-bg);color:var(--fg);}
    .curr-row .other-btn{padding:.35rem .7rem;font-size:.85rem;}
    @media (max-width: 480px) {
      .curr-row { flex-direction: column; align-items: flex-start; }
      .curr-row select { width: 100%; box-sizing: border-box; }
      #currency_a { width: 100%; box-sizing: border-box; }
    }
    .rates-date-btn{background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:20px;padding:.28rem .85rem;font-size:.78rem;color:var(--muted);cursor:pointer;display:none;transition:border-color .15s,color .15s,background .15s;white-space:nowrap;}
    .rates-date-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--hover-bg);}
    .rates-wrap{position:relative;display:block;margin-top:.6rem;}
    .rates-info-panel{position:absolute;left:0;top:calc(100% + 4px);z-index:20;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:8px;padding:.75rem 1rem;min-width:280px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:.82rem;display:none;}
    .rates-info-row{display:flex;justify-content:space-between;gap:1.5rem;padding:.18rem 0;color:var(--fg);}
    .rates-info-label{color:var(--muted);font-weight:600;}
    .rates-countdown{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600;}
  </style>
{% endblock %}

{% block content %}
  <h1>Currency Converter</h1>

  <div id="msg-area"></div>

  <form id="currency-form">
    <div>
      <label for="currency_i">From Currency</label>
      <div class="curr-row" data-wt="currency-from">
        <select id="currency_i" required></select>
        <input type="text" id="currency_i_other" placeholder="e.g. VND" maxlength="5" style="display:none;">
        <button type="button" class="btn other-btn" id="currency_i_other_btn" onclick="applyOtherFrom()" style="display:none;">OK</button>
        <span id="currency_i_note" style="font-size:.8rem;color:#6b7280;"></span>
      </div>
    </div>
    <div>
      <label for="currency_a">Amount</label>
      <input name="currency_a" id="currency_a" type="number" step="any" inputmode="decimal" required placeholder="e.g. 100">
    </div>
    <div>
      <label for="currency_o">To Currency</label>
      <div class="curr-row">
        <select id="currency_o" required></select>
        <input type="text" id="currency_o_other" placeholder="e.g. VND" maxlength="5" style="display:none;">
        <button type="button" class="btn other-btn" id="currency_o_other_btn" onclick="applyOtherTo()" style="display:none;">OK</button>
        <span id="currency_o_note" style="font-size:.8rem;color:#6b7280;"></span>
      </div>
    </div>
    <br>
    <button class="btn" type="submit" id="conv-btn">Convert</button>
    <div class="rates-wrap">
      <button id="rates-date-btn" type="button" class="rates-date-btn" onclick="toggleRatesPanel()"></button>
      <div id="rates-info-panel" class="rates-info-panel"></div>
    </div>
  </form>

  <div class="result" id="result-box" style="display:none;">
    <p id="result-text"></p></output>
  </div>
{% endblock %}

{% block body_scripts %}
<script>

const CURRENCIES = [
  {code:'USD', name:'US Dollar'}, {code:'EUR', name:'Euro'},
  {code:'GBP', name:'British Pound'}, {code:'JPY', name:'Japanese Yen'},
  {code:'CNY', name:'Chinese Yuan'}, {code:'HKD', name:'Hong Kong Dollar'},
  {code:'SGD', name:'Singapore Dollar'}, {code:'AED', name:'UAE Dirham'},
  {code:'CAD', name:'Canadian Dollar'}, {code:'AUD', name:'Australian Dollar'},
  {code:'NZD', name:'New Zealand Dollar'}, {code:'CHF', name:'Swiss Franc'},
  {code:'INR', name:'Indian Rupee'}, {code:'KRW', name:'South Korean Won'},
  {code:'THB', name:'Thai Baht'}, {code:'MYR', name:'Malaysian Ringgit'},
  {code:'IDR', name:'Indonesian Rupiah'}, {code:'PHP', name:'Philippine Peso'},
  {code:'VND', name:'Vietnamese Dong'}, {code:'TWD', name:'Taiwan Dollar'},
  {code:'MXN', name:'Mexican Peso'}, {code:'BRL', name:'Brazilian Real'},
  {code:'ARS', name:'Argentine Peso'}, {code:'ZAR', name:'South African Rand'},
  {code:'EGP', name:'Egyptian Pound'}, {code:'NGN', name:'Nigerian Naira'},
  {code:'TRY', name:'Turkish Lira'}, {code:'SEK', name:'Swedish Krona'},
  {code:'NOK', name:'Norwegian Krone'}, {code:'DKK', name:'Danish Krone'},
  {code:'PLN', name:'Polish Zloty'}, {code:'CZK', name:'Czech Koruna'},
  {code:'PKR', name:'Pakistani Rupee'}, {code:'BDT', name:'Bangladeshi Taka'},
  {code:'SAR', name:'Saudi Riyal'}, {code:'ILS', name:'Israeli Shekel'},
];


function populateSelects(){
  ['currency_i','currency_o'].forEach((id,idx)=>{
    const sel=document.getElementById(id);
    sel.innerHTML='';
    const placeholder=document.createElement('option');
    placeholder.value=''; placeholder.textContent='— select —';
    placeholder.disabled=true; placeholder.selected=true;
    sel.appendChild(placeholder);
    CURRENCIES.forEach(c=>{
      const opt=document.createElement('option');
      opt.value=c.code; opt.textContent=c.name+' - '+c.code;
      sel.appendChild(opt);
    });
    const other=document.createElement('option');
    other.value='__other__'; other.textContent='Other…';
    sel.appendChild(other);
    sel.addEventListener('change',()=>onSelChange(id));
  });

  document.getElementById('currency_i').value='USD';
  document.getElementById('currency_o').value='HKD';
}
populateSelects();

function onSelChange(id){
  const sel=document.getElementById(id);
  const inp=document.getElementById(id+'_other');
  const btn=document.getElementById(id+'_other_btn');
  const note=document.getElementById(id+'_note');
  if(sel.value==='__other__'){
    inp.style.display='inline-block';
    btn.style.display='inline-block';
    note.textContent='Enter a code (2–5 letters) and click OK.';
    inp.focus();
  } else {
    inp.style.display='none';
    btn.style.display='none';
    note.textContent='';
  }
}

function applyOther(id){
  const inp=document.getElementById(id+'_other');
  const note=document.getElementById(id+'_note');
  const sel=document.getElementById(id);
  const raw=inp.value.trim().toUpperCase();
  if(!raw){ note.textContent='Enter a currency code.'; note.style.color='#dc2626'; return; }
  if(!/^[A-Z]{2,5}$/.test(raw)){
    note.textContent='Use 2–5 letters (e.g. THB, VND).'; note.style.color='#dc2626'; return;
  }

  let opt=[...sel.options].find(o=>o.value===raw);
  if(!opt){
    opt=document.createElement('option');
    opt.value=raw; opt.textContent=raw+' (custom)';
    opt.dataset.custom='1';

    sel.insertBefore(opt, sel.querySelector('option[value="__other__"]'));
  }
  sel.value=raw;
  inp.style.display='none';
  document.getElementById(id+'_other_btn').style.display='none';
  note.textContent=''; note.style.color='#6b7280';
  inp.value='';
}
function applyOtherFrom(){ applyOther('currency_i'); }
function applyOtherTo(){ applyOther('currency_o'); }
document.getElementById('currency_i_other').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();applyOtherFrom();}});
document.getElementById('currency_o_other').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();applyOtherTo();}});

function showError(msg){
  document.getElementById('msg-area').innerHTML='<div class="error">'+msg+'</div>';
  document.getElementById('result-box').style.display='none';
}
function dropBadCustom(selectId, code){
  const s=document.getElementById(selectId);
  const bad=[...s.options].find(o=>o.value===code && o.dataset.custom==='1');
  if(bad) bad.remove();
  if(s.value===''||s.value===code) s.value=(selectId==='currency_i'?'USD':'HKD');
}
function clearMsg(){ document.getElementById('msg-area').innerHTML=''; }
function showInfo(msg){
  document.getElementById('msg-area').innerHTML='<div class="success">'+msg+'</div>';
}


function dropBadCustom(selectId, code){
  const s=document.getElementById(selectId);
  const bad=[...s.options].find(o=>o.value===code && o.dataset.custom==='1');
  if(bad) bad.remove();
  if(s.value===''||s.value===code){
    s.value = (selectId==='currency_i'?'USD':'HKD');
  }
}

document.getElementById('currency-form').addEventListener('submit', async function(e){
  e.preventDefault();
  clearMsg();

  const fromSel=document.getElementById('currency_i').value;
  const toSel=document.getElementById('currency_o').value;
  if(!fromSel||fromSel==='__other__'){ showError('Please select a "From" currency (or apply a custom code).'); return; }
  if(!toSel||toSel==='__other__'){ showError('Please select a "To" currency (or apply a custom code).'); return; }
  const amount=parseFloat(document.getElementById('currency_a').value);
  if(isNaN(amount)||amount<0){ showError('Please enter a valid non-negative amount.'); return; }

  const fromRaw=fromSel.toUpperCase();
  const toRaw=toSel.toUpperCase();

  const btn=document.getElementById('conv-btn');
  btn.disabled=true; btn.textContent='Fetching…';
  showInfo('Fetching exchange rate…');

  try{
    const obj = await fiappGetRates(fromRaw);
    const rates = obj.rates;

    const rate = rates[toRaw];
    if(rate === undefined){
      showError('Unknown target currency code: "'+toRaw+'". Please check and try again.');
      dropBadCustom('currency_o', toRaw);
      return;
    }

    const converted=(amount*rate).toFixed(2);
    clearMsg();
    document.getElementById('result-text').innerHTML=
      '<strong>'+amount+' '+fromRaw+'</strong> = <strong>'+converted+' '+toRaw+'</strong>'
      +'<br><small style="color:#6b7280">Rate: 1 '+fromRaw+' = '+rate.toFixed(4)+' '+toRaw+'</small>';
    document.getElementById('result-box').style.display='block';


    updateRatesDateBtn(new Date(obj.fetched_at));

  }catch(err){
    if(err.message&&err.message.includes('unsupported-code')){
      showError('Unknown currency code: "'+fromRaw+'". Please check and try again.');
      dropBadCustom('currency_i', fromRaw);
    } else {
      showError('Could not fetch exchange rates - '+err.message);
    }
  }finally{
    btn.disabled=false; btn.textContent='Convert';
  }
});

async function refreshRates(fromRaw){
  fromRaw=(fromRaw||document.getElementById('currency_i').value||'USD').toUpperCase();
  try{
    const obj=await fiappGetRates(fromRaw, true);
    updateRatesDateBtn(new Date(obj.fetched_at));
    showInfo('Rates refreshed.');
  }catch(e){ showError('Refresh failed: '+e.message); }
}

document.addEventListener('DOMContentLoaded', function(){
  const d=fiappRatesCachedAt('USD');
  if(d) updateRatesDateBtn(d);
});

// ── Rate cache info panel ──────────────────────────────────────
const _LS_TTL_MS=7*24*3600*1000;
let _ratesTick=null;

function updateRatesDateBtn(d){
  const btn=document.getElementById('rates-date-btn');
  btn.textContent='Rates as of: '+d.toLocaleDateString()+' '+d.toLocaleTimeString()+' ⓘ';
  btn.style.display='inline-block';
}

function _getUserCurrencies(){
  const curs=new Set(['USD']);
  try{ Object.values(JSON.parse(localStorage.getItem('fiapp_subs_v4')||'{}').rowCurrencies||{}).forEach(c=>{if(c)curs.add(c);}); }catch(e){}
  try{ Object.values(JSON.parse(localStorage.getItem('fiapp_income_v1')||'{}').monthRowCurrencies||{}).forEach(c=>{if(c)curs.add(c);}); }catch(e){}
  return [...curs].sort();
}

function _getCachedBases(){
  const bases=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith('fiapp_exchange_rates_')) continue;
    try{
      const obj=JSON.parse(localStorage.getItem(k));
      if(obj&&obj.fetched_at) bases.push({base:k.replace('fiapp_exchange_rates_',''),fetched_at:obj.fetched_at});
    }catch(e){}
  }
  return bases.sort((a,b)=>a.base.localeCompare(b.base));
}

function _fmtCountdown(msLeft){
  if(msLeft<=0) return 'overdue';
  const s=Math.floor(msLeft/1000);
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(d>0) return d+'d '+h+'h '+m+'m';
  if(h>0) return h+'h '+m+'m '+sec+'s';
  return m+'m '+sec+'s';
}

function _buildRatesPanel(){
  const panel=document.getElementById('rates-info-panel');
  const userCurs=_getUserCurrencies();
  const bases=_getCachedBases();
  const now=Date.now();
  let html='<div style="font-weight:700;margin-bottom:.45rem;color:var(--fg);">🕐 Rate Cache</div>';
  if(userCurs.length>1)
    html+='<div style="color:var(--muted);font-size:.77rem;margin-bottom:.5rem;">Your currencies: '+userCurs.join(', ')+'</div>';
  if(!bases.length){
    html+='<div style="color:var(--muted);padding:.2rem 0;">No cached rates yet — convert something first.</div>';
  } else {
    bases.forEach(b=>{
      const fetched=new Date(b.fetched_at);
      const msLeft=fetched.getTime()+_LS_TTL_MS-now;
      html+='<div class="rates-info-row"><span class="rates-info-label">Base: '+b.base+'</span>'
        +'<span style="display:flex;align-items:center;gap:.5rem;">'
        +'<span>'+fetched.toLocaleDateString()+' '+fetched.toLocaleTimeString()+'</span>'
        +'<button type="button" class="btn-ghost btn-sm" style="padding:.1rem .4rem;font-size:.75rem;" onclick="_refreshBase(\''+b.base+'\')">↻</button>'
        +'</span></div>'
        +'<div style="font-size:.77rem;padding-bottom:.38rem;color:var(--muted);">'
        +'Next refresh: <span class="rates-countdown" id="rcd-'+b.base+'">'+_fmtCountdown(msLeft)+'</span></div>';
    });
  }
  html+='<hr style="border:none;border-top:1px solid var(--panel-border);margin:.4rem -.1rem .45rem;">'
    +'<div style="display:flex;gap:.5rem;">'
    +'<button type="button" class="btn-ghost btn-sm" onclick="_refreshFromPanel()">↻ Refresh all</button>'
    +'<button type="button" class="btn-ghost btn-sm" onclick="closeRatesPanel()">✕ Close</button>'
    +'</div>';
  panel.innerHTML=html;
}

function _tickCountdowns(){
  const now=Date.now();
  _getCachedBases().forEach(b=>{
    const el=document.getElementById('rcd-'+b.base);
    if(el) el.textContent=_fmtCountdown(new Date(b.fetched_at).getTime()+_LS_TTL_MS-now);
  });
}

function toggleRatesPanel(){
  const panel=document.getElementById('rates-info-panel');
  if(panel.style.display==='none'||panel.style.display===''){
    _buildRatesPanel();
    panel.style.display='block';
    _ratesTick=setInterval(_tickCountdowns,1000);
    setTimeout(()=>document.addEventListener('click',_closeRatesPanelOutside),0);
  } else {
    closeRatesPanel();
  }
}

function closeRatesPanel(){
  const panel=document.getElementById('rates-info-panel');
  panel.style.display='none';
  clearInterval(_ratesTick);
  document.removeEventListener('click',_closeRatesPanelOutside);
}

function _closeRatesPanelOutside(e){
  const panel=document.getElementById('rates-info-panel');
  const btn=document.getElementById('rates-date-btn');
  if(!panel.contains(e.target)&&!btn.contains(e.target)) closeRatesPanel();
}

async function _refreshFromPanel(){
  const panel=document.getElementById('rates-info-panel');
  panel.querySelectorAll('button').forEach(b=>{b.disabled=true;});
  const toRefresh=_getCachedBases().map(b=>b.base);
  if(!toRefresh.length) toRefresh.push('USD');
  for(const base of toRefresh){
    try{ await fiappGetRates(base,true); }catch(e){ showError('Refresh '+base+' failed: '+e.message); }
  }
  const first=_getCachedBases()[0];
  if(first) updateRatesDateBtn(new Date(first.fetched_at));
  showInfo('All rates refreshed.');
  _buildRatesPanel();
}

async function _refreshBase(base){
  const panel=document.getElementById('rates-info-panel');
  panel.querySelectorAll('button').forEach(b=>{b.disabled=true;});
  try{
    const obj=await fiappGetRates(base,true);
    updateRatesDateBtn(new Date(obj.fetched_at));
    showInfo(base+' rates refreshed.');
  }catch(e){ showError('Refresh '+base+' failed: '+e.message); }
  _buildRatesPanel();
}
</script>
{% endblock %}
