<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Currency Converter</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="nav">
    <a href="./index.html">← Home</a>
  </div>
  <h1>Currency Converter</h1>

  <div id="msg-area"></div>

  <form id="currency-form">
    <div>
      <label for="currency_i">From Currency (e.g: HKD, USD)</label>
      <input name="currency_i" id="currency_i" required placeholder="e.g. USD">
    </div>
    <div>
      <label for="currency_a">Amount</label>
      <input name="currency_a" id="currency_a" type="number" step="any" required placeholder="e.g. 100">
    </div>
    <div>
      <label for="currency_o">To Currency (e.g: AED, EUR)</label>
      <input name="currency_o" id="currency_o" required placeholder="e.g. AED">
    </div>
    <br>
    <button class="btn" type="submit" id="conv-btn">Convert</button>
  </form>

  <div class="result" id="result-box" style="display:none;">
    <p id="result-text"></p>
  </div>

<script>
const API_KEY = '081a97e88979627d1194f7ee';

function showError(msg){
  const area = document.getElementById('msg-area');
  area.innerHTML = '<div class="error">' + msg + '</div>';
  document.getElementById('result-box').style.display = 'none';
}
function clearMsg(){ document.getElementById('msg-area').innerHTML = ''; }

function showInfo(msg){
  const area = document.getElementById('msg-area');
  area.innerHTML = '<div class="success">' + msg + '</div>';
}

document.getElementById('currency-form').addEventListener('submit', async function(e){
  e.preventDefault();
  clearMsg();

  const fromRaw = document.getElementById('currency_i').value.trim().toUpperCase();
  const toRaw   = document.getElementById('currency_o').value.trim().toUpperCase();
  const amount  = parseFloat(document.getElementById('currency_a').value);

  // Validation
  if(!/^[A-Z]{2,5}$/.test(fromRaw)){
    showError('Invalid "From" currency code. Use 2–5 letters (e.g. USD, HKD).');
    return;
  }
  if(!/^[A-Z]{2,5}$/.test(toRaw)){
    showError('Invalid "To" currency code. Use 2–5 letters (e.g. AED, EUR).');
    return;
  }
  if(isNaN(amount) || amount < 0){
    showError('Please enter a valid non-negative amount.');
    return;
  }

  const btn = document.getElementById('conv-btn');
  btn.disabled = true;
  btn.textContent = 'Fetching…';
  showInfo('Fetching exchange rate…');

  try{
    const url = 'https://v6.exchangerate-api.com/v6/' + API_KEY + '/latest/' + fromRaw;
    const resp = await fetch(url);
    const data = await resp.json();

    if(data.result !== 'success'){
      const errType = data['error-type'] || 'unknown-error';
      if(errType === 'unsupported-code'){
        showError('Unknown currency code: "' + fromRaw + '". Please check and try again.');
      } else {
        showError('Exchange rate API error: ' + errType);
      }
      return;
    }

    const rate = data.conversion_rates[toRaw];
    if(rate === undefined){
      showError('Unknown target currency code: "' + toRaw + '". Please check and try again.');
      return;
    }

    const converted = (amount * rate).toFixed(4);
    clearMsg();
    document.getElementById('result-text').innerHTML =
      '<strong>' + amount + ' ' + fromRaw + '</strong> = <strong>' + converted + ' ' + toRaw + '</strong>'
      + '<br><small style="color:#6b7280">Rate: 1 ' + fromRaw + ' = ' + rate.toFixed(6) + ' ' + toRaw + '</small>';
    document.getElementById('result-box').style.display = 'block';

  }catch(err){
    showError('Network error — could not fetch exchange rates. Check your connection.');
  }finally{
    btn.disabled = false;
    btn.textContent = 'Convert';
  }
});
</script>
</body>
</html>
