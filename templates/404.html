<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script>(function(){var t=localStorage.getItem('fiapp_theme')||'{{ theme|default("light") }}';if(t==='dark')document.documentElement.classList.add('dark');else if(t!=='light')document.documentElement.classList.add('theme-'+t);})();</script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:1rem;padding:2rem;">
    <div style="font-size:3.5rem;">🗺️</div>
    <h1 style="font-size:2rem;margin:0;">404 - Page Not Found</h1>
    <p style="color:var(--muted);max-width:400px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn" style="margin-top:.5rem;">← Back to Home</a>
  </div>
</body>
</html>
